name: CI

on:
  pull_request:
    branches: [master, dev]
  push:
    branches: [master, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend: Install + Test ───────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm (Corepack)
        run: corepack enable && corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Identity Firewall backend tests
        working-directory: backend
        run: >
          pnpm test -- --runInBand
          tests/unit/identitySerializers.test.js
          tests/unit/identityPolicy.test.js
          tests/unit/identityFirewallPrivacy.test.js
          tests/unit/identityFirewallHardening.test.js
          tests/unit/identityFirewallRegression.test.js
          tests/unit/identityFirewallMigrationSmoke.test.js
          tests/unit/identityFirewallRawUserAuditScript.test.js
          tests/unit/personaCompliance.test.js
          tests/unit/feedIdentityAuthors.test.js
          tests/unit/rawUserIdentityResponses.test.js

      # P0.7 — Privacy gates (Audience Profile design v2 §13 + §16).
      # Three categories: (1) serializer forbidden-keys contract,
      # (2) notification template + cross-context harness,
      # (3) source-level grep guards against legacy patterns +
      #     raw User-personal SELECTs.
      # Run them in their own step so a privacy regression surfaces with
      # a clear failure label.
      - name: Run privacy gates
        working-directory: backend
        run: pnpm run test:privacy

      - name: Run Jest tests
        working-directory: backend
        run: pnpm test

  # ─── Seeder: Install + Test ────────────────────────────────────────────────
  seeder-test:
    name: Seeder Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install seeder dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r pantopus-seeder/requirements.txt -r pantopus-seeder/requirements-lambda.txt

      - name: Run seeder tests
        working-directory: pantopus-seeder
        run: pytest tests/ -q

  # ─── Web: Type-check + Lint ────────────────────────────────────────────────
  web-checks:
    name: Web Type-check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm (Corepack)
        run: corepack enable && corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Use pnpm --filter directly (not turbo) to avoid linting dependency
      # packages like @pantopus/types which have no eslint.config.js
      - name: Lint web
        run: pnpm --filter=@pantopus/web lint

      - name: Run Identity Firewall web Jest tests
        run: |
          if [ -f frontend/apps/web/tests/identityFirewallWeb.test.tsx ]; then
            pnpm --filter=@pantopus/web test -- tests/identityFirewallWeb.test.tsx --runInBand
          else
            echo "Skipping production Identity Firewall web Jest test; tests/identityFirewallWeb.test.tsx is not present in this native repo."
          fi

      - name: Run Identity Firewall Playwright tests
        run: |
          if [ -f frontend/apps/web/tests/e2e/identity-firewall.spec.ts ]; then
            pnpm --filter=@pantopus/web exec playwright install --with-deps chromium
            pnpm --filter=@pantopus/web exec playwright test tests/e2e/identity-firewall.spec.ts --project=chromium
          else
            echo "Skipping production Identity Firewall Playwright test; tests/e2e/identity-firewall.spec.ts is not present in this native repo."
          fi

      # Pre-existing TS errors exist — runs but won't block CI for now
      - name: Type-check web
        run: pnpm --filter=@pantopus/web type-check
        continue-on-error: true
