name: Android CI

on:
  push:
    branches: [master, main]
    paths:
      - "frontend/apps/android/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "frontend/apps/android/**"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend/apps/android

jobs:
  quality:
    name: Lint, test, assemble
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Write placeholder .env (CI only needs defaults)
        run: |
          cat > .env <<'ENV'
          PANTOPUS_API_BASE_URL=http://10.0.2.2:8000
          PANTOPUS_SOCKET_URL=http://10.0.2.2:8000
          STRIPE_PUBLISHABLE_KEY=pk_test_ci_placeholder
          MAPS_API_KEY=
          ENV

      - name: ktlint
        run: ./gradlew ktlintCheck --no-daemon

      - name: detekt
        run: ./gradlew detekt --no-daemon

      - name: Android Lint
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Unit tests
        run: ./gradlew test --no-daemon

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            frontend/apps/android/app/build/reports/tests/
            frontend/apps/android/app/build/reports/detekt/
            frontend/apps/android/app/build/reports/lint-results-debug.html
          retention-days: 7

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: frontend/apps/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  instrumented:
    name: Instrumented tests (emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Write placeholder .env
        run: |
          cat > .env <<'ENV'
          PANTOPUS_API_BASE_URL=http://10.0.2.2:8000
          PANTOPUS_SOCKET_URL=http://10.0.2.2:8000
          STRIPE_PUBLISHABLE_KEY=pk_test_ci_placeholder
          MAPS_API_KEY=
          ENV

      - name: Run Compose UI + instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          working-directory: frontend/apps/android
          script: ./gradlew connectedDebugAndroidTest --no-daemon

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumented-reports
          path: frontend/apps/android/app/build/reports/androidTests/
          retention-days: 7
