name: Android CI

on:
  push:
    branches: [master, main]
    paths:
      - "frontend/apps/android/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "frontend/apps/android/**"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend/apps/android

jobs:
  quality:
    name: Lint, test, assemble
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Free disk space for Android build
        run: |
          echo "Disk before cleanup:"
          df -h

          sudo rm -rf \
            /opt/ghc \
            /usr/local/share/boost \
            /usr/share/dotnet

          if [[ -n "${ANDROID_HOME:-}" ]]; then
            sudo rm -rf \
              "${ANDROID_HOME}/cmake" \
              "${ANDROID_HOME}/ndk" \
              "${ANDROID_HOME}/system-images"
          fi

          docker system prune --all --force || true
          sudo apt-get clean

          echo "Disk after cleanup:"
          df -h

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          gradle-home-cache-excludes: |
            caches/transforms-*
            caches/*/transforms

      - name: Write placeholder .env (CI only needs defaults)
        run: |
          cat > .env <<'ENV'
          PANTOPUS_API_BASE_URL=http://10.0.2.2:8000
          PANTOPUS_SOCKET_URL=http://10.0.2.2:8000
          STRIPE_PUBLISHABLE_KEY=pk_test_ci_placeholder
          MAPS_API_KEY=
          ENV

      - name: No raw hex in feature code
        # Acceptance criterion #5 from Prompt P1 — feature code must use
        # `PantopusColors.*` / `LocalPantopusTokens` tokens, never raw
        # `Color(0xRRGGBB...)` or `#RRGGBB(AA)` literals (in code or
        # comments). Token files under `ui/theme/` are exempt by design.
        run: |
          if grep -rnE '#[0-9a-fA-F]{6,8}' app/src/main/java/app/pantopus/android/ui/screens ; then
            echo "::error::Raw hex literals found in feature code. Use PantopusColors.* tokens instead."
            exit 1
          fi
          echo "✓ No raw hex literals in ui/screens."

      - name: Lint, test, snapshots, assemble
        # P14 acceptance: a deliberately broken snapshot (e.g. a colour
        # change) must fail CI. The `paparazziVerify` task is wired in
        # `app/build.gradle.kts` and runs `verifyPaparazziDebug`.
        run: |
          ./gradlew \
            ktlintCheck \
            detekt \
            :app:lintDebug \
            test \
            paparazziVerify \
            :app:assembleDebug \
            --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            frontend/apps/android/app/build/reports/tests/
            frontend/apps/android/app/build/reports/detekt/
            frontend/apps/android/app/build/reports/lint-results-debug.html
            frontend/apps/android/app/build/paparazzi/
          retention-days: 7

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: frontend/apps/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  instrumented:
    name: Instrumented tests (emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Write placeholder .env
        run: |
          cat > .env <<'ENV'
          PANTOPUS_API_BASE_URL=http://10.0.2.2:8000
          PANTOPUS_SOCKET_URL=http://10.0.2.2:8000
          STRIPE_PUBLISHABLE_KEY=pk_test_ci_placeholder
          MAPS_API_KEY=
          ENV

      - name: Free disk space for emulator image
        run: |
          echo "Disk before cleanup:"
          df -h

          sudo rm -rf \
            /opt/ghc \
            /usr/local/share/boost \
            /usr/share/dotnet

          if [[ -n "${ANDROID_HOME:-}" ]]; then
            sudo rm -rf \
              "${ANDROID_HOME}/cmake" \
              "${ANDROID_HOME}/ndk" \
              "${ANDROID_HOME}/system-images"
          fi

          docker system prune --all --force || true
          sudo apt-get clean

          echo "Disk after cleanup:"
          df -h

      - name: Run Compose UI + instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_2
          cores: 2
          ram-size: 2048M
          heap-size: 512M
          emulator-boot-timeout: 1200
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: frontend/apps/android
          script: ./gradlew connectedDebugAndroidTest --no-daemon

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumented-reports
          path: frontend/apps/android/app/build/reports/androidTests/
          retention-days: 7
