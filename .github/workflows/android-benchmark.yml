name: Android Benchmark (nightly)

# Runs the macrobenchmark suite from `:benchmark` once a day so we
# catch cold-launch / Hub-render regressions independent of the per-PR
# CI. Triggered manually for ad-hoc captures and on a daily schedule.
#
# The `:benchmark` Gradle module is documented in
# `frontend/apps/android/docs/perf_budgets.md` but hasn't landed yet —
# the job prints a clear "skipped" diagnostic and exits 0 until the
# module exists, so a missing module doesn't fail the schedule.
on:
  schedule:
    # 09:00 UTC ≈ 02:00 PT — runs while the team is asleep so the
    # report is waiting in the morning. Cron syntax: m h dom mon dow.
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: android-benchmark-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend/apps/android

jobs:
  macrobenchmark:
    name: Macrobenchmark on Pixel 6 (API 34)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Write placeholder .env
        run: |
          cat > .env <<'ENV'
          PANTOPUS_API_BASE_URL=http://10.0.2.2:8000
          PANTOPUS_SOCKET_URL=http://10.0.2.2:8000
          STRIPE_PUBLISHABLE_KEY=pk_test_ci_placeholder
          MAPS_API_KEY=
          ENV

      - name: Check for :benchmark module
        id: benchmark_module
        run: |
          if [[ -f benchmark/build.gradle.kts ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning:::benchmark Gradle module not found — see docs/perf_budgets.md."
          fi

      - name: Enable KVM
        if: steps.benchmark_module.outputs.present == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run macrobenchmark
        if: steps.benchmark_module.outputs.present == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 900
          working-directory: frontend/apps/android
          script: ./gradlew :benchmark:connectedCheck --no-daemon

      - name: Upload benchmark reports
        if: steps.benchmark_module.outputs.present == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: android-macrobenchmark-${{ github.run_id }}
          path: frontend/apps/android/benchmark/build/outputs/connected_android_test_additional_output/
          retention-days: 30

      - name: Skipped diagnostic
        if: steps.benchmark_module.outputs.present != 'true'
        run: |
          echo "## Macrobenchmark skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The \`:benchmark\` Gradle module isn't wired yet. See" \
            >> "$GITHUB_STEP_SUMMARY"
          echo "\`frontend/apps/android/docs/perf_budgets.md\` for the recipe." \
            >> "$GITHUB_STEP_SUMMARY"
