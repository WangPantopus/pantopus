name: Android Beta (Play Store)

on:
  push:
    tags:
      - "android-v*"
  workflow_dispatch:

defaults:
  run:
    working-directory: frontend/apps/android

jobs:
  play_internal:
    name: Upload AAB to Play Internal track
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: android-release

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: frontend/apps/android

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > pantopus-release.jks

      - name: Write .env + signing properties
        env:
          PANTOPUS_API_BASE_URL: ${{ secrets.PANTOPUS_API_BASE_URL }}
          PANTOPUS_SOCKET_URL: ${{ secrets.PANTOPUS_SOCKET_URL }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          PANTOPUS_KEYSTORE_PASSWORD: ${{ secrets.PANTOPUS_KEYSTORE_PASSWORD }}
          PANTOPUS_KEY_ALIAS: ${{ secrets.PANTOPUS_KEY_ALIAS }}
          PANTOPUS_KEY_PASSWORD: ${{ secrets.PANTOPUS_KEY_PASSWORD }}
        run: |
          cat > .env <<ENV
          PANTOPUS_API_BASE_URL=$PANTOPUS_API_BASE_URL
          PANTOPUS_SOCKET_URL=$PANTOPUS_SOCKET_URL
          STRIPE_PUBLISHABLE_KEY=$STRIPE_PUBLISHABLE_KEY
          MAPS_API_KEY=$MAPS_API_KEY
          PANTOPUS_KEYSTORE_FILE=$(pwd)/pantopus-release.jks
          PANTOPUS_KEYSTORE_PASSWORD=$PANTOPUS_KEYSTORE_PASSWORD
          PANTOPUS_KEY_ALIAS=$PANTOPUS_KEY_ALIAS
          PANTOPUS_KEY_PASSWORD=$PANTOPUS_KEY_PASSWORD
          ENV

      - name: Write Play service account JSON
        run: |
          mkdir -p fastlane
          echo '${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}' > fastlane/play-service-account.json

      - name: Fastlane beta
        run: bundle exec fastlane beta
