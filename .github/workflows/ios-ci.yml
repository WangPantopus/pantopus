name: iOS CI

on:
  push:
    branches: [master, main]
    paths:
      - "frontend/apps/ios/**"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    paths:
      - "frontend/apps/ios/**"
      - ".github/workflows/ios-ci.yml"
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend/apps/ios

jobs:
  lint:
    name: Lint (SwiftLint + SwiftFormat)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint & SwiftFormat
        run: brew install swiftlint swiftformat

      - name: SwiftLint
        run: swiftlint lint --strict

      - name: SwiftFormat (lint only)
        run: swiftformat --lint .

      - name: No raw hex in feature code
        # Acceptance criterion #5 from Prompt P1 — feature code must use
        # `Theme.Color.*` tokens, never raw `#RRGGBB(AA)` literals (in code
        # or comments). Token files under `Pantopus/Core/Design/` are
        # exempt by design.
        run: |
          if grep -rnE '#[0-9a-fA-F]{6,8}' Pantopus/Features ; then
            echo "::error::Raw hex literals found in feature code. Use Theme.Color.* tokens instead."
            exit 1
          fi
          echo "✓ No raw hex literals in Pantopus/Features."

  test:
    name: Tests on ${{ matrix.simulator }}
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        simulator:
          - "iPhone 16"
          - "iPhone 16 Pro"
          - "iPhone SE (3rd generation)"
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # Xcode 16.4 ships with the iOS 18.5 simulator runtime
        # preinstalled on the macos-15 runner image; older 16.x bundles
        # may be missing their runtime, leading to "iOS X is not
        # installed" errors when xcodebuild looks for a destination.
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available iOS simulators
        # Surfaces the actual installed runtimes/devices so destination
        # mismatches are visible in the log instead of as a one-line
        # xcodebuild error.
        run: |
          xcrun simctl list runtimes
          xcrun simctl list devices available iPhone

      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Generate project
        run: xcodegen generate

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          # v2 — bust the previous cache; restore had been failing with
          # `gtar: Cannot mkdir: Invalid argument` on sentry-cocoa, which
          # poisoned every subsequent test run. Bumping the key forces a
          # clean re-resolve.
          key: spm-v2-${{ runner.os }}-${{ hashFiles('frontend/apps/ios/project.yml') }}
          restore-keys: |
            spm-v2-${{ runner.os }}-

      # Sanitised matrix entry → safe artifact + bundle name (no spaces /
      # parentheses). Used by the result-bundle path and the upload step.
      - name: Compute simulator slug
        id: sim
        run: |
          slug=$(echo "${{ matrix.simulator }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/-+$//')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Run tests
        # CI runners have no Apple Developer signing identity. Disable
        # signing so the simulator-only test/build works without a
        # provisioning profile.
        run: |
          set -o pipefail
          xcodebuild \
            -project Pantopus.xcodeproj \
            -scheme Pantopus \
            -destination "platform=iOS Simulator,name=${{ matrix.simulator }},OS=latest" \
            -configuration Debug \
            -enableCodeCoverage YES \
            -resultBundlePath "TestResults-${{ steps.sim.outputs.slug }}.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            clean test | xcbeautify

      - name: Extract coverage summary
        if: always()
        run: |
          set -e
          bundle="TestResults-${{ steps.sim.outputs.slug }}.xcresult"
          if [[ -d "$bundle" ]]; then
            echo "## iOS coverage — ${{ matrix.simulator }}" >> "$GITHUB_STEP_SUMMARY"
            xcrun xccov view --report --only-targets "$bundle" \
              | tee coverage-${{ steps.sim.outputs.slug }}.txt \
              | head -40 >> "$GITHUB_STEP_SUMMARY" || true
            xcrun xccov view --report --json "$bundle" \
              > coverage-${{ steps.sim.outputs.slug }}.json || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results-${{ steps.sim.outputs.slug }}
          path: |
            frontend/apps/ios/TestResults-${{ steps.sim.outputs.slug }}.xcresult
            frontend/apps/ios/coverage-${{ steps.sim.outputs.slug }}.txt
            frontend/apps/ios/coverage-${{ steps.sim.outputs.slug }}.json
          retention-days: 7

  build:
    name: Build (Debug simulator)
    runs-on: macos-15
    needs: lint
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # Xcode 16.4 ships with the iOS 18.5 simulator runtime
        # preinstalled on the macos-15 runner image; older 16.x bundles
        # may be missing their runtime, leading to "iOS X is not
        # installed" errors when xcodebuild looks for a destination.
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project Pantopus.xcodeproj \
            -scheme Pantopus \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            build | xcbeautify
