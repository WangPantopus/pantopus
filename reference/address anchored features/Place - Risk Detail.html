<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place — Risk & Readiness detail (C5)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --canvas-bg: #eceff3; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas-bg); font-family: var(--font-sans); color: var(--app-text); -webkit-font-smoothing: antialiased; }

  .canvas { padding: 56px 40px 96px; max-width: 1360px; margin: 0 auto; }

  .doc-head { margin-bottom: 12px; }
  .doc-kicker { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-identity-home); }
  .doc-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 8px 0 8px; }
  .doc-sub { font-size: 15px; color: var(--fg3); max-width: 820px; line-height: 22px; margin: 0; }
  .doc-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 18px; }
  .doc-meta div { font-size: 12.5px; color: var(--fg3); display: flex; align-items: center; gap: 7px; }
  .doc-meta b { color: var(--fg2); font-weight: 600; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid rgba(0,0,0,.08); }

  .zone { margin-top: 56px; }
  .zone-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .zone-num { font-size: 13px; font-weight: 700; color: var(--color-identity-home); font-variant-numeric: tabular-nums; }
  .zone-title { font-size: 22px; font-weight: 700; letter-spacing: -.015em; margin: 0; }
  .zone-sub { font-size: 14px; color: var(--fg3); margin: 0 0 26px; max-width: 820px; line-height: 21px; }

  /* product cards */
  .pl-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .td-back:hover { background: #f6f7f9 !important; }
  .rk-row { transition: background .12s ease; }
  .rk-row:hover { background: #f8fafb !important; }

  .dash-wrap { display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .stage-cap { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .side-note { max-width: 330px; }
  .side-note h4 { margin: 28px 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .side-note h4:first-child { margin-top: 0; }
  .side-note p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  .spec-row { display: flex; flex-wrap: wrap; gap: 30px 40px; align-items: flex-start; }
  .specimen { width: 360px; }
  .spec-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .spec-tag { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .spec-note { font-size: 12px; color: var(--fg4); }
  .spec-stage { background: #f6f7f9; border: 1px solid #e7eaee; border-radius: 18px; padding: 16px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="place-components.jsx"></script>
<script type="text/babel" src="place-today-detail.jsx"></script>
<script type="text/babel" src="place-risk-detail.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Specimen({ tag, note, children }) {
  return (
    <div className="specimen">
      <div className="spec-label">
        <span className="spec-tag">{tag}</span>
        {note && <span className="spec-note">{note}</span>}
      </div>
      <div className="spec-stage">{children}</div>
    </div>
  );
}

function App() {
  return (
    <div className="canvas">
      <div className="doc-head">
        <div className="doc-kicker">Pantopus · Place · C5 — Risk & Readiness detail</div>
        <h1 className="doc-title">Risk, then readiness</h1>
        <p className="doc-sub">Tap-through from Risk &amp; Readiness. The one hazard that's live — flood — reads as a plain zone with a plain meaning and a FEMA source. Earthquake and wildfire wait honestly as "Coming soon." Then the screen turns from risk to action: the old build-your-plan form grows up into a calm, source-cited readiness checklist — go-bag, contacts, a meeting point — that you can tick off and watch fill in.</p>
        <div className="doc-meta">
          <div><span className="sw" style={{ background: '#16A34A' }}></span> Low risk / readiness <b>Home green #16A34A</b></div>
          <div><span className="sw" style={{ background: '#9ca3af' }}></span> Coming soon <b>Muted slate</b></div>
          <div><span className="sw" style={{ background: '#f6f7f9' }}></span> Shell <b>#f6f7f9</b>, white bordered cards</div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">01</span>
          <h2 className="zone-title">The screen</h2>
        </div>
        <p className="zone-sub">Risk up top, readiness below. Flood states the zone and what it means in one breath; the deferred hazards don't pretend to be ready. The emergency plan is the heart of the screen — tick items in the phone and the progress bar moves. It never tells you what to do in a crisis; it helps you prepare before one.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <RiskDetail />
            </IOSDevice>
            <div className="stage-cap">Tap items to check off your plan</div>
          </div>

          <div className="side-note">
            <h4>Risk in plain words</h4>
            <p>"Zone X — minimal risk" is the FEMA label; the "what this means" line translates it into something a resident can act on, including the honest caveat that low-risk isn't no-risk. Sourced and dated, like every reading.</p>

            <h4>Honest about what's missing</h4>
            <p>Earthquake and wildfire matter here, but the data isn't wired up yet. Rather than guess, they sit as muted "Coming soon" rows — a visible promise instead of a silent gap.</p>

            <h4>From form to checklist</h4>
            <p>The dashboard's "build your plan" was a blank form. Here it's upgraded into a guided, pre-populated checklist drawn from Ready.gov and the Red Cross — readiness becomes ticking boxes, not staring at empty fields.</p>

            <h4>Progress you can feel</h4>
            <p>A simple "5 of 11 ready" bar turns preparedness into momentum. Each tap nudges it forward — calm reinforcement, no nagging, no red.</p>

            <h4>Informational, never instructions</h4>
            <p>The closing line draws the bright line: this helps you prepare, it is not what to do mid-emergency. For that, call 911 and follow local officials.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">02</span>
          <h2 className="zone-title">The pieces</h2>
        </div>
        <p className="zone-sub">Flood's plain-meaning card and the readiness checklist on the stage. The checklist is one card with a progress header and three grouped sets of checkable rows — go-bag, contacts, meeting point — each pre-seeded with source-recommended items.</p>

        <div className="spec-row">
          <Specimen tag="Flood" note="zone → meaning → source">
            <FloodCard />
          </Specimen>
          <Specimen tag="Emergency plan" note="source-cited, checkable">
            <EmergencyPlan />
          </Specimen>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
