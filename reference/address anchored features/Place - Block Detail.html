<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place — Your Block detail (C6)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --canvas-bg: #eceff3; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas-bg); font-family: var(--font-sans); color: var(--app-text); -webkit-font-smoothing: antialiased; }

  .canvas { padding: 56px 40px 96px; max-width: 1360px; margin: 0 auto; }

  .doc-head { margin-bottom: 12px; }
  .doc-kicker { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-identity-home); }
  .doc-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 8px 0 8px; }
  .doc-sub { font-size: 15px; color: var(--fg3); max-width: 820px; line-height: 22px; margin: 0; }
  .doc-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 18px; }
  .doc-meta div { font-size: 12.5px; color: var(--fg3); display: flex; align-items: center; gap: 7px; }
  .doc-meta b { color: var(--fg2); font-weight: 600; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid rgba(0,0,0,.08); }

  .zone { margin-top: 56px; }
  .zone-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .zone-num { font-size: 13px; font-weight: 700; color: var(--color-identity-home); font-variant-numeric: tabular-nums; }
  .zone-title { font-size: 22px; font-weight: 700; letter-spacing: -.015em; margin: 0; }
  .zone-sub { font-size: 14px; color: var(--fg3); margin: 0 0 26px; max-width: 820px; line-height: 21px; }

  /* product cards */
  .pl-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .td-back:hover { background: #f6f7f9 !important; }
  .rk-row { transition: background .12s ease; }
  .rk-row:hover { background: #f8fafb !important; }
  .pl-textbtn:hover { color: #0369a1 !important; }

  .dash-wrap { display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .stage-cap { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .side-note { max-width: 330px; }
  .side-note h4 { margin: 28px 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .side-note h4:first-child { margin-top: 0; }
  .side-note p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  .spec-row { display: flex; flex-wrap: wrap; gap: 30px 40px; align-items: flex-start; }
  .specimen { width: 360px; }
  .spec-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .spec-tag { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .spec-note { font-size: 12px; color: var(--fg4); }
  .spec-stage { background: #f6f7f9; border: 1px solid #e7eaee; border-radius: 18px; padding: 16px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="place-components.jsx"></script>
<script type="text/babel" src="place-today-detail.jsx"></script>
<script type="text/babel" src="place-block-detail.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Specimen({ tag, note, children }) {
  return (
    <div className="specimen">
      <div className="spec-label">
        <span className="spec-tag">{tag}</span>
        {note && <span className="spec-note">{note}</span>}
      </div>
      <div className="spec-stage">{children}</div>
    </div>
  );
}

function App() {
  return (
    <div className="canvas">
      <div className="doc-head">
        <div className="doc-kicker">Pantopus · Place · C6 — Your Block detail</div>
        <h1 className="doc-title">Your block, and the work happening on it</h1>
        <p className="doc-sub">Tap-through from Your Block. Density stays qualitative — a feel for how many verified homes are near, never a count — with the standing invitation to be one of the first on your block. Below it, light Census context grounds the neighborhood: when homes here were built, what they're worth. Then, where the city publishes them, a quiet list of recent permits nearby. Tap one and it opens as a plain-English leaf: what the work is, where, when, and what its status actually means. Outside covered metros, the section says so honestly rather than guessing.</p>
        <div className="doc-meta">
          <div><span className="sw" style={{ background: '#16A34A' }}></span> Home green <b>#16A34A</b></div>
          <div><span className="sw" style={{ background: '#0284C7' }}></span> First-to-verify CTA <b>Sky #0284C7</b></div>
          <div><span className="sw" style={{ background: '#9ca3af' }}></span> Unavailable / muted <b>Slate</b></div>
          <div><span className="sw" style={{ background: '#f6f7f9' }}></span> Shell <b>#f6f7f9</b>, white bordered cards</div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">01</span>
          <h2 className="zone-title">The screen</h2>
        </div>
        <p className="zone-sub">Density, neighborhood, permits — in that order, from most personal to most public. Tap any permit row in the phone and it pushes into the permit leaf; the back chevron returns you. Try it.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <BlockDetail covered={true} />
            </IOSDevice>
            <div className="stage-cap">Tap a permit to open its detail</div>
          </div>

          <div className="side-note">
            <h4>Density without a number</h4>
            <p>"A few verified homes nearby" is a feel, not a count — the same qualitative bucket used on the dashboard, never an exact tally that could expose who's verified. The sky CTA turns a sparse block into an invitation.</p>

            <h4>Census as gentle context</h4>
            <p>Two figures — median year built and median value — set the scene without pretending to describe your specific home. The plain line ties it back to you: "yours sits a little above that."</p>

            <h4>Permits, where they exist</h4>
            <p>Covered metros get a short list of recent nearby work — type, date, distance, status — each a tappable row. It reads like awareness of the block, not surveillance of a neighbor.</p>

            <h4>Privacy by generalization</h4>
            <p>Addresses are rounded to the block ("next door", "2 blocks away"), never pinned to a house. Public record, handled with a light touch.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">02</span>
          <h2 className="zone-title">The permit leaf</h2>
        </div>
        <p className="zone-sub">A permit number is bureaucratic noise. This leaf translates it: one line on what the work is, an approximate where, a three-step timeline, and a colored note that says — in plain words — what "In review" or "Final" means for the block.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <PermitDetail permit={PERMITS[1]} onBack={() => {}} />
            </IOSDevice>
            <div className="stage-cap">Solar install · Issued</div>
          </div>

          <div className="side-note">
            <h4>What, not jargon</h4>
            <p>"Roof-mounted solar array… tie-in to the existing panel." Every leaf opens with one human sentence describing the actual work, before any code or category.</p>

            <h4>A status you can read</h4>
            <p>The timeline shows Filed → Issued → Final as a stepper, and a tinted note spells out what the current state means — approved and active, still under review, or closed after inspection.</p>

            <h4>Always sourced</h4>
            <p>City permits-and-inspections, updated weekly, with the standing reminder that these are public records shown for awareness — addresses generalized to the block.</p>

            <h4>Three honest statuses</h4>
            <p>In review (amber), Issued (sky), Final (green). No invented states, no severity theater — just where the paperwork actually is.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">03</span>
          <h2 className="zone-title">The pieces</h2>
        </div>
        <p className="zone-sub">The building blocks, and the two faces of the permits section: the covered list, and the honest unavailable state for metros without published records.</p>

        <div className="spec-row">
          <Specimen tag="Density" note="qualitative + first-to-verify">
            <DensityCard bucket="few" />
          </Specimen>
          <Specimen tag="Census context" note="median built · median value">
            <CensusCard />
          </Specimen>
          <Specimen tag="Permits — covered" note="type · date · distance · status">
            <PermitsList covered={true} onOpen={() => {}} />
          </Specimen>
          <Specimen tag="Permits — uncovered" note="honest unavailable state">
            <PermitsList covered={false} />
          </Specimen>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
