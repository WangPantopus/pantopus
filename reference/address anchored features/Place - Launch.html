<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place — Launch hero (A2)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --canvas-bg: #eceff3; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas-bg); font-family: var(--font-sans); color: var(--app-text); -webkit-font-smoothing: antialiased; }

  .canvas { padding: 56px 40px 96px; max-width: 1360px; margin: 0 auto; }

  .doc-head { margin-bottom: 12px; }
  .doc-kicker { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-identity-home); }
  .doc-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 8px 0 8px; }
  .doc-sub { font-size: 15px; color: var(--fg3); max-width: 780px; line-height: 22px; margin: 0; }
  .doc-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 18px; }
  .doc-meta div { font-size: 12.5px; color: var(--fg3); display: flex; align-items: center; gap: 7px; }
  .doc-meta b { color: var(--fg2); font-weight: 600; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid rgba(0,0,0,.08); }

  .zone { margin-top: 56px; }
  .zone-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .zone-num { font-size: 13px; font-weight: 700; color: var(--color-identity-home); font-variant-numeric: tabular-nums; }
  .zone-title { font-size: 22px; font-weight: 700; letter-spacing: -.015em; margin: 0; }
  .zone-sub { font-size: 14px; color: var(--fg3); margin: 0 0 26px; max-width: 800px; line-height: 21px; }

  /* product cards (inside #f6f7f9 stage and phone) */
  .pl-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .pl-hero { box-shadow: 0 3px 12px rgba(17,24,39,.06), 0 1px 2px rgba(0,0,0,.04); }
  .pl-textbtn:hover { color: #0369a1 !important; }

  /* launch interactions */
  .lx-primary { transition: background .15s ease, box-shadow .15s ease; }
  .lx-primary:hover { background: #0369a1 !important; }
  .lx-back:hover { background: #f3f4f6 !important; }
  .lx-clear:hover { background: #e5e7eb !important; }
  .lx-region:hover { background: #f3f4f6 !important; }
  .lx-secondary:hover { color: #374151 !important; }
  .lx-sugg:hover { background: #f6f9fb; }
  .lx-caret { animation: lx-blink 1.1s steps(1) infinite; }
  @keyframes lx-blink { 50% { opacity: 0; } }

  /* beacon rings (global hero) */
  .lx-ring { position: absolute; border-radius: 9999px; border: 1.5px solid rgba(2,132,199,0.30); }
  .lx-ring-1 { width: 78px; height: 78px; }
  .lx-ring-2 { width: 96px; height: 96px; border-color: rgba(2,132,199,0.16); }
  .lx-beacon .lx-ring-1 { animation: lx-pulse 2.6s ease-out infinite; }
  .lx-beacon .lx-ring-2 { animation: lx-pulse 2.6s ease-out .6s infinite; }
  @keyframes lx-pulse { 0% { transform: scale(.82); opacity: .9; } 70% { opacity: .15; } 100% { transform: scale(1.12); opacity: 0; } }

  .dash-wrap { display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .phone-cap { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .phone-cap span { font-weight: 500; text-transform: none; letter-spacing: 0; color: var(--fg4); margin-left: 8px; }
  .side-note { max-width: 330px; }
  .side-note h4 { margin: 28px 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .side-note h4:first-child { margin-top: 0; }
  .side-note p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  .note-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(232px, 1fr)); gap: 26px 32px; margin-top: 34px; max-width: 1080px; }
  .note-grid h4 { margin: 0 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .note-grid p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }
  .phone-strip { display: flex; flex-wrap: wrap; gap: 30px 36px; }

  @media (prefers-reduced-motion: reduce) { .lx-caret, .lx-ring { animation: none !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="place-components.jsx"></script>
<script type="text/babel" src="place-launch.jsx"></script>
<script type="text/babel" src="place-address.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <div className="canvas">
      <div className="doc-head">
        <div className="doc-kicker">Pantopus · Place · A2 — Onboarding launch hero</div>
        <h1 className="doc-title">Launch hero — first run, U.S. default</h1>
        <p className="doc-sub">The front door, before an address is typed. Region is detected (United States), so the screen leads with one clear job: enter an address and see your place. Flat shell, one primary path, a quiet escape hatch for people who only came to follow or browse. No account, no nav bar yet.</p>
        <div className="doc-meta">
          <div><span className="sw" style={{ background: '#16A34A' }}></span> Brand mark <b>Home green #16A34A</b></div>
          <div><span className="sw" style={{ background: '#0284C7' }}></span> Primary CTA <b>Sky #0284C7</b></div>
          <div><span className="sw" style={{ background: '#f6f7f9' }}></span> Shell <b>flat #f6f7f9</b></div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">01</span>
          <h2 className="zone-title">Resting hero</h2>
        </div>
        <p className="zone-sub">Centered and calm. Brand top-left, detected region top-right (tap to change). The headline makes a promise — <b>see what's true about your address</b> — the sub names what's inside, and the address field plus <b>See your place</b> is the only thing to do. Trust line sits under the button; the browse-only link waits quietly at the bottom.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <LaunchHero state="resting" />
            </IOSDevice>
            <div className="phone-cap">Resting <span>region detected · U.S.</span></div>
          </div>

          <div className="side-note">
            <h4>One job, stated plainly</h4>
            <p>Verbs-first and concrete. The address field is the hero; everything else supports it. No "unlock", no "seamless", no exclamation — just what it does.</p>

            <h4>Region is detected, not asked</h4>
            <p>U.S. is inferred and shown as a pill you can change, so the screen never opens with a chooser. Other regions swap copy and record sources behind the same layout.</p>

            <h4>Trust before the tap</h4>
            <p>"Private by default. Verification builds trust, not exposure." sits right under the button — the reassurance lands exactly where the hesitation is.</p>

            <h4>An exit for non-owners</h4>
            <p>Not everyone is here to claim a home. "Just here to follow someone or browse?" is a low-key text link, present but never competing with the primary path.</p>

            <h4>Other platforms</h4>
            <p>iOS shown. On Android the field and button keep the same stack with a Material filled button and the region pill in the top app bar. On web it becomes a centered single-column hero in the 1024 content frame, brand in the top nav, region in the utility row.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">02</span>
          <h2 className="zone-title">Typing — address autocomplete</h2>
        </div>
        <p className="zone-sub">The moment they tap in. The field focuses with a sky ring, the headline tightens to the top to make room, and verified-geocoded matches appear as you type. The best match is highlighted and return-key ready — one tap from the resting hero to a real place.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860} keyboard={true}>
              <LaunchHero state="typing" />
            </IOSDevice>
            <div className="phone-cap">Typing <span>autocomplete · best match ready</span></div>
          </div>

          <div className="side-note">
            <h4>Matches, not guesses</h4>
            <p>Suggestions come from geocoded address records, so the first result is usually the right one — surfaced in sky with a return glyph to confirm.</p>

            <h4>The headline yields</h4>
            <p>On focus the hero compresses: the promise shrinks to a single line up top and the input owns the screen above the keyboard. Sub copy and trust line step aside until there's a result.</p>

            <h4>Still no account</h4>
            <p>Picking a match goes straight to the public preview (screen A3). Saving the place is what later asks for an account — never the address lookup itself.</p>
          </div>
        </div>
      </div>
      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">03</span>
          <h2 className="zone-title">Launch hero — non-U.S. default</h2>
        </div>
        <p className="zone-sub">Region detected outside the U.S., where address-backed Home features aren't live yet. The screen leads with the part that works everywhere: <b>follow the people and places you care about</b>. The beacon motif and a single <b>Create your account</b> set the global framing. A small link routes anyone with a U.S. address to the address flow, and a quiet footnote sets the expectation for Home.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <GlobalHero region="United Kingdom" />
            </IOSDevice>
            <div className="phone-cap">Global <span>region detected · non-U.S.</span></div>
          </div>

          <div className="side-note">
            <h4>Lead with what ships everywhere</h4>
            <p>Following, fanning, and messaging verified people work in any region. So outside the U.S. the hero sells the social layer, not an address it can't yet verify.</p>

            <h4>Account, not address</h4>
            <p>The primary is "Create your account" — there's no address field to anchor here. Sky beacon for the people layer; the green brand mark stays so it's the same Pantopus.</p>

            <h4>A door back to the address flow</h4>
            <p>"Have a U.S. address? Look it up →" is a low-key link for the traveler or expat, routing to the typed address-entry flow (A4) — no camera scan, just the same lookup as the U.S. default.</p>

            <h4>Set expectations honestly</h4>
            <p>"Home features are coming to your region." is a quiet footnote, not a promise wrapped in hype — no "unlock", no exclamation. It tells the truth about what isn't here yet.</p>

            <h4>Other platforms</h4>
            <p>iOS shown. Android keeps the centered beacon stack with a Material filled button and the region pill in the top app bar. On web it's a centered single-column hero in the 1024 frame; the "Look it up" link routes to the same typed address-entry flow.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">04</span>
          <h2 className="zone-title">Address input + autocomplete</h2>
        </div>
        <p className="zone-sub">The typed-lookup screen, reached from the U.S. hero or the "Look it up" link. One focused input drives everything; matches arrive as list rows with a map-pin. Four states — and the off-coverage case is a calm hand-off, never a red error.</p>

        <div className="phone-strip">
          <div className="phone-col">
            <IOSDevice width={402} height={860} keyboard={true}>
              <AddressEntry state="empty" />
            </IOSDevice>
            <div className="phone-cap">Empty <span>focused · no input</span></div>
          </div>
          <div className="phone-col">
            <IOSDevice width={402} height={860} keyboard={true}>
              <AddressEntry state="typing" />
            </IOSDevice>
            <div className="phone-cap">Typing <span>live suggestions</span></div>
          </div>
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <AddressEntry state="selected" />
            </IOSDevice>
            <div className="phone-cap">Selected <span>CTA enabled</span></div>
          </div>
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <AddressEntry state="unsupported" />
            </IOSDevice>
            <div className="phone-cap">Unsupported region <span>calm hand-off</span></div>
          </div>
        </div>

        <div className="note-grid">
          <div>
            <h4>Empty: get them moving</h4>
            <p>The field opens focused with the keyboard up. "Use my current location" is the one shortcut; a faint hint sets the expectation — no empty void, no "Loading…".</p>
          </div>
          <div>
            <h4>Typing: matches, not guesses</h4>
            <p>Geocoded address rows appear as you type, reusing the list-row recipe. The best match sits in sky with a return glyph — confirm from the keyboard without lifting a thumb.</p>
          </div>
          <div>
            <h4>Selected: confirm, then go</h4>
            <p>The input locks to the full address with a green check; a card echoes the match with an "Address matched" chip. "See your place" is now enabled. Still no account to look.</p>
          </div>
          <div>
            <h4>Unsupported: a door, not a wall</h4>
            <p>A non-U.S. address gets a plain-spoken "Home features are U.S.-only for now" and two things that still work — follow and browse — with a route to Beacon. Warm amber field, never error red.</p>
          </div>
          <div>
            <h4>Other platforms</h4>
            <p>iOS shown. Android keeps the same input-over-list stack with a Material text field and the system keyboard; the back affordance moves to the top app bar. On web it's a centered single column in the 1024 frame, suggestions in a dropdown under the field.</p>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
