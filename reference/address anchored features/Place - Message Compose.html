<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place — Neighbor message / compose (D1)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --canvas-bg: #eceff3; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas-bg); font-family: var(--font-sans); color: var(--app-text); -webkit-font-smoothing: antialiased; }

  .canvas { padding: 56px 40px 96px; max-width: 1360px; margin: 0 auto; }

  .doc-head { margin-bottom: 12px; }
  .doc-kicker { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-identity-home); }
  .doc-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 8px 0 8px; }
  .doc-sub { font-size: 15px; color: var(--fg3); max-width: 820px; line-height: 22px; margin: 0; }
  .doc-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 18px; }
  .doc-meta div { font-size: 12.5px; color: var(--fg3); display: flex; align-items: center; gap: 7px; }
  .doc-meta b { color: var(--fg2); font-weight: 600; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid rgba(0,0,0,.08); }

  .zone { margin-top: 56px; }
  .zone-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .zone-num { font-size: 13px; font-weight: 700; color: var(--color-identity-home); font-variant-numeric: tabular-nums; }
  .zone-title { font-size: 22px; font-weight: 700; letter-spacing: -.015em; margin: 0; }
  .zone-sub { font-size: 14px; color: var(--fg3); margin: 0 0 26px; max-width: 820px; line-height: 21px; }

  /* product cards */
  .pl-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .pl-tpl:hover { border-color: #cbd5e1 !important; }
  .pl-textbtn:hover { color: #0369a1 !important; }
  .pl-send:hover:not(:disabled) { background: #0369a1 !important; }
  .td-back:hover { background: #f6f7f9 !important; }
  .pl-skel { position: relative; overflow: hidden; background: #eef1f4; }

  .dash-wrap { display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .stage-cap { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .side-note { max-width: 330px; }
  .side-note h4 { margin: 28px 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .side-note h4:first-child { margin-top: 0; }
  .side-note p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  .spec-row { display: flex; flex-wrap: wrap; gap: 30px 40px; align-items: flex-start; }
  .specimen { width: 360px; }
  .spec-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .spec-tag { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .spec-note { font-size: 12px; color: var(--fg4); }
  .spec-stage { background: #f6f7f9; border: 1px solid #e7eaee; border-radius: 18px; padding: 16px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="place-components.jsx"></script>
<script type="text/babel" src="place-today-detail.jsx"></script>
<script type="text/babel" src="place-message-compose.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Specimen({ tag, note, children }) {
  return (
    <div className="specimen">
      <div className="spec-label">
        <span className="spec-tag">{tag}</span>
        {note && <span className="spec-note">{note}</span>}
      </div>
      <div className="spec-stage">{children}</div>
    </div>
  );
}

function App() {
  const [sel, setSel] = useState('noise');
  const [sel2, setSel2] = useState('package');
  return (
    <div className="canvas">
      <div className="doc-head">
        <div className="doc-kicker">Pantopus · Place · D1 — Neighbor message / compose</div>
        <h1 className="doc-title">Reach a neighbor you can't otherwise contact — safely</h1>
        <p className="doc-sub">The first screen of the Inbox. Verified residents can send a short, neighborly note to another verified home on their block — without ever exchanging names or numbers. The trust-and-safety rules aren't a policy page; they're built into the screen. There's no text box to type in: you pick from a small set of neutral, pre-written notes, so a message can't turn into harassment. It's delivered anonymously as “from a verified neighbor nearby,” it's limited to a few a week, and anyone can block. The preview shows exactly what the other person will see — including the Block button they get.</p>
        <div className="doc-meta">
          <div><span className="sw" style={{ background: '#16A34A' }}></span> Verified / safe <b>Home green #16A34A</b></div>
          <div><span className="sw" style={{ background: '#0284C7' }}></span> Send <b>Sky #0284C7</b></div>
          <div><span className="sw" style={{ background: '#F0F9FF' }}></span> Privacy note <b>Sky info card</b></div>
          <div><span className="sw" style={{ background: '#FEF2F2' }}></span> Block <b>Red, recipient-side only</b></div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">01</span>
          <h2 className="zone-title">The screen</h2>
        </div>
        <p className="zone-sub">A single compose flow: who it goes to, the note you pick, how it lands for them, and the rules — with Send pinned at the bottom. Tap a different note in the phone and the delivery preview updates to match. There is no free-text field anywhere on this screen.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <MessageCompose selected={sel} onSelect={setSel} />
            </IOSDevice>
            <div className="stage-cap">Tap a note · the delivery preview follows</div>
          </div>

          <div className="side-note">
            <h4>Templates only, by design</h4>
            <p>No text box, anywhere. You choose from a few neutral, pre-written notes, so a message can't become a complaint, a sales pitch, or harassment. The constraint is the safety feature.</p>

            <h4>You stay anonymous</h4>
            <p>The recipient sees “a verified neighbor nearby,” never your name or address. The sky privacy note says so up front, before you've picked anything.</p>

            <h4>Addressed, within your block</h4>
            <p>You can only reach verified homes on your own block — picked by address, not by person. No directory, no search for strangers.</p>

            <h4>Rate-limited and blockable</h4>
            <p>A few messages a week, and anyone can block. The preview even shows the recipient's Block button, so you send knowing they're in control.</p>

            <h4>Respectful by default</h4>
            <p>The “good to know” card sets the tone before Send — neighborly heads-ups only — so expectations are clear without a wall of legal text.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">02</span>
          <h2 className="zone-title">The note, and how it lands</h2>
        </div>
        <p className="zone-sub">The sender reads the exact words that will be delivered — selecting a note is selecting the whole message. The preview reframes those same words as the recipient sees them: anonymized, verified, and with their own Reply and Block controls.</p>

        <div className="spec-row">
          <Specimen tag="Template picker" note="radio · pick one">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {MSG_TEMPLATES.slice(0, 3).map((tpl) => (
                <TemplateRow key={tpl.id} t={tpl} selected={tpl.id === sel2} onSelect={setSel2} />
              ))}
            </div>
          </Specimen>
          <Specimen tag="Delivery preview" note="the recipient's view">
            <DeliveryPreview t={MSG_TEMPLATES.find((x) => x.id === sel2) || MSG_TEMPLATES[0]} />
          </Specimen>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">03</span>
          <h2 className="zone-title">The safety rails</h2>
        </div>
        <p className="zone-sub">The pieces that make an anonymous channel between strangers tolerable. The privacy promise, the respectful-use and rate-limit card, the address-scoped recipient, and the Send bar that restates the terms one last time.</p>

        <div className="spec-row">
          <Specimen tag="Recipient + privacy" note="address, not a name">
            <div style={{ display: 'flex', flexDirection: 'column' }}>
              <RecipientCard />
              <PrivacyNote />
            </div>
          </Specimen>
          <Specimen tag="Respectful use" note="rate limit · block">
            <SafetyCard />
          </Specimen>
          <Specimen tag="Send bar" note="restates the terms">
            <div style={{ borderRadius: 14, overflow: 'hidden', border: '1px solid #e7eaee' }}>
              <SendBar enabled={true} />
            </div>
          </Specimen>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
