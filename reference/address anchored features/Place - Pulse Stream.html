<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place — Today's Pulse / full stream (C10)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --canvas-bg: #eceff3; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas-bg); font-family: var(--font-sans); color: var(--app-text); -webkit-font-smoothing: antialiased; }

  .canvas { padding: 56px 40px 96px; max-width: 1360px; margin: 0 auto; }

  .doc-head { margin-bottom: 12px; }
  .doc-kicker { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-identity-home); }
  .doc-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 8px 0 8px; }
  .doc-sub { font-size: 15px; color: var(--fg3); max-width: 820px; line-height: 22px; margin: 0; }
  .doc-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 18px; }
  .doc-meta div { font-size: 12.5px; color: var(--fg3); display: flex; align-items: center; gap: 7px; }
  .doc-meta b { color: var(--fg2); font-weight: 600; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid rgba(0,0,0,.08); }

  .zone { margin-top: 56px; }
  .zone-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .zone-num { font-size: 13px; font-weight: 700; color: var(--color-identity-home); font-variant-numeric: tabular-nums; }
  .zone-title { font-size: 22px; font-weight: 700; letter-spacing: -.015em; margin: 0; }
  .zone-sub { font-size: 14px; color: var(--fg3); margin: 0 0 26px; max-width: 820px; line-height: 21px; }

  /* product cards */
  .pl-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .pl-signal { border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); cursor: pointer; transition: transform .15s ease-out, box-shadow .15s ease-out; }
  .pl-signal:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.07); }
  .pl-textbtn:hover { color: #0369a1 !important; }
  .td-back:hover { background: #f6f7f9 !important; }
  .pl-skel { position: relative; overflow: hidden; background: #eef1f4; }

  .dash-wrap { display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .hero-toggle { display: inline-flex; background: #fff; border: 1px solid #e5e7eb; border-radius: 9999px; padding: 4px; gap: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .hero-toggle button { border: none; background: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; color: #6b7280; padding: 7px 16px; border-radius: 9999px; white-space: nowrap; }
  .hero-toggle button.on { background: #16A34A; color: #fff; }
  .side-note { max-width: 330px; }
  .side-note h4 { margin: 28px 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .side-note h4:first-child { margin-top: 0; }
  .side-note p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  .spec-row { display: flex; flex-wrap: wrap; gap: 30px 40px; align-items: flex-start; }
  .specimen { width: 360px; }
  .spec-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .spec-tag { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .spec-note { font-size: 12px; color: var(--fg4); }
  .spec-stage { background: #f6f7f9; border: 1px solid #e7eaee; border-radius: 18px; padding: 16px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="place-components.jsx"></script>
<script type="text/babel" src="place-today-detail.jsx"></script>
<script type="text/babel" src="place-pulse-stream.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Specimen({ tag, note, children }) {
  return (
    <div className="specimen">
      <div className="spec-label">
        <span className="spec-tag">{tag}</span>
        {note && <span className="spec-note">{note}</span>}
      </div>
      <div className="spec-stage">{children}</div>
    </div>
  );
}

function App() {
  const [day, setDay] = useState('calm');
  return (
    <div className="canvas">
      <div className="doc-head">
        <div className="doc-kicker">Pantopus · Place · C10 — Today's Pulse / full stream</div>
        <h1 className="doc-title">Every signal for your home, ranked into one stream</h1>
        <p className="doc-sub">The tap-through from the hero opens the whole Pulse — the feed sibling to the structured dashboard. Where the dashboard files each reading under its category, the Pulse flattens them into a single list ranked by what actually matters to your address today: alerts first, then opportunities, what's changing around you, and the housekeeping you can get to whenever. Most days it opens on a calm all-clear summary; when the weather turns, the same stream lifts the warnings to the top and tints them. Every card is a title, a one-line detail, a Lucide icon, and one verb-first action — nothing is a dead end.</p>
        <div className="doc-meta">
          <div><span className="sw" style={{ background: '#16A34A' }}></span> Place accent <b>Home green #16A34A</b></div>
          <div><span className="sw" style={{ background: '#0284C7' }}></span> Opportunities / actions <b>Sky #0284C7</b></div>
          <div><span className="sw" style={{ background: '#FFFBEB' }}></span> Alerts <b>Amber wash, no red floods</b></div>
          <div><span className="sw" style={{ background: '#f6f7f9' }}></span> Shell <b>#f6f7f9</b>, white bordered cards</div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">01</span>
          <h2 className="zone-title">The screen</h2>
        </div>
        <p className="zone-sub">A standard ContentDetail: the sticky header names the place, then the ranked stream scrolls beneath it. Flip the day below — on a calm day the all-clear summary tops the list; on an active day a "Needs attention" tier of tinted alerts takes its place, and everything underneath holds its rank.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <PulseStream urgent={day === 'active'} />
            </IOSDevice>
            <div className="hero-toggle" role="group" aria-label="Day state">
              <button className={day === 'calm' ? 'on' : ''} onClick={() => setDay('calm')}>Calm day</button>
              <button className={day === 'active' ? 'on' : ''} onClick={() => setDay('active')}>Active day</button>
            </div>
          </div>

          <div className="side-note">
            <h4>The stream, not the dashboard</h4>
            <p>Same address-anchored signals as the grouped dashboard — air, bills, your block, civic, readiness — but ranked by what matters today instead of filed by category. One scroll, top to bottom.</p>

            <h4>All clear is a real answer</h4>
            <p>Most days nothing is urgent, and the top card says so plainly — with the three things it checked. It still hands you what's worth a look, so the calm state is useful, not empty.</p>

            <h4>Ranked into honest tiers</h4>
            <p>Needs attention → Worth a look → Around you → When you have a minute. The order is the priority; the labels just name it. No invented scores, no red "1" badges.</p>

            <h4>Color carries severity</h4>
            <p>Only alerts wear a tint and rise to the top. Opportunities, block updates, and housekeeping stay calm white. The page never floods red to get your attention.</p>

            <h4>Every card acts</h4>
            <p>Title, one-line detail, one verb-first action. Check your eligibility, see your block, build your plan — each signal ends somewhere you can go.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">02</span>
          <h2 className="zone-title">The top of the stream</h2>
        </div>
        <p className="zone-sub">What lands first sets the tone for the whole list. On a calm day it's the all-clear summary — the answer, plus the three readings that earned it. On an active day the alerts take the top slot, tinted to their severity.</p>

        <div className="spec-row">
          <Specimen tag="All clear summary" note="calm day · the top card">
            <AllClearSummary />
          </Specimen>
          <Specimen tag="Alert signal" note="active day · tinted, ranked first">
            <SignalCard
              tone="warning" emphasis icon="wind" meta="Live"
              title="Air quality is unhealthy for sensitive groups"
              detail="AQI 112 right now. Limit time outdoors this afternoon — it should clear by evening."
              action="See air quality"
            />
          </Specimen>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">03</span>
          <h2 className="zone-title">The signal card</h2>
        </div>
        <p className="zone-sub">One atom, four tones. The icon tile and any chip carry the category; the title states the signal, the line beneath explains it, and the sky action says what to do. An opportunity, a block update, and a piece of housekeeping read as the same card at different volumes.</p>

        <div className="spec-row">
          <Specimen tag="Opportunity" note="sky tone">
            <SignalCard
              tone="sky" icon="badge-percent" meta="New"
              title="A heat-pump rebate may apply to your home"
              detail="You could be eligible for up to $1,600 back. Verify a few details to confirm."
              action="Check your eligibility"
            />
          </Specimen>
          <Specimen tag="Block update" note="home tone">
            <SignalCard
              tone="home" icon="house" meta="2d ago"
              title="A new home verified on your block"
              detail="Two doors down on SE Oak St. Your block is starting to form — 3 verified homes now."
              action="See your block"
            />
          </Specimen>
          <Specimen tag="Benchmark" note="warning tone + chip">
            <SignalCard
              tone="warning" icon="zap"
              title="Your electric bill runs high"
              detail="About 12% above similar verified homes near you this season."
              chip={{ tone: 'warning', text: '12% above', icon: 'trending-up' }}
              action="See where it's going"
            />
          </Specimen>
          <Specimen tag="Housekeeping" note="muted tone">
            <SignalCard
              tone="muted" icon="file-text"
              title="Generate a residency letter"
              detail="Verified proof of address, ready whenever a landlord, school, or office needs it."
              action="Generate a letter"
            />
          </Specimen>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
