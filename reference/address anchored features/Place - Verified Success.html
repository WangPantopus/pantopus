<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place — Verified (B3)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --canvas-bg: #eceff3; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas-bg); font-family: var(--font-sans); color: var(--app-text); -webkit-font-smoothing: antialiased; }

  .canvas { padding: 56px 40px 96px; max-width: 1360px; margin: 0 auto; }

  .doc-head { margin-bottom: 12px; }
  .doc-kicker { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-identity-home); }
  .doc-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 8px 0 8px; }
  .doc-sub { font-size: 15px; color: var(--fg3); max-width: 820px; line-height: 22px; margin: 0; }
  .doc-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 18px; }
  .doc-meta div { font-size: 12.5px; color: var(--fg3); display: flex; align-items: center; gap: 7px; }
  .doc-meta b { color: var(--fg2); font-weight: 600; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid rgba(0,0,0,.08); }

  .zone { margin-top: 56px; }
  .zone-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .zone-num { font-size: 13px; font-weight: 700; color: var(--color-identity-home); font-variant-numeric: tabular-nums; }
  .zone-title { font-size: 22px; font-weight: 700; letter-spacing: -.015em; margin: 0; }
  .zone-sub { font-size: 14px; color: var(--fg3); margin: 0 0 26px; max-width: 820px; line-height: 21px; }

  /* product cards */
  .pl-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }

  /* verify interactions */
  .vf-primary { transition: background .15s ease, box-shadow .15s ease; }
  .vf-primary:hover { background: #0369a1 !important; }
  .vd-row { transition: background .15s ease; }
  .vd-row:hover { background: #f6f9fb; }

  /* calm reveal — base state is visible; the stagger plays only when the
     screen is armed (.do-reveal), so static captures & reduced-motion show content */
  @media (prefers-reduced-motion: no-preference) {
    .do-reveal .vd-seal { animation: vd-seal-in 460ms cubic-bezier(0.16,0.84,0.44,1) both; }
    .do-reveal .vd-title { animation: vd-fade-up 420ms ease-out both; animation-delay: 220ms; }
    .do-reveal .vd-row { animation: vd-fade-up 380ms ease-out both; animation-delay: calc(360ms + var(--i) * 90ms); }
    .do-reveal .vd-footer { animation: vd-fade-up 380ms ease-out both; animation-delay: 680ms; }
    @keyframes vd-seal-in { from { opacity: 0; transform: scale(0.82); } to { opacity: 1; transform: scale(1); } }
    @keyframes vd-fade-up { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: translateY(0); } }
  }

  .dash-wrap { display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .phone-cap { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .phone-cap span { font-weight: 500; text-transform: none; letter-spacing: 0; color: var(--fg4); margin-left: 8px; }
  .side-note { max-width: 330px; }
  .side-note h4 { margin: 28px 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .side-note h4:first-child { margin-top: 0; }
  .side-note p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  .spec-row { display: flex; flex-wrap: wrap; gap: 30px 40px; align-items: flex-start; }
  .specimen { width: 340px; }
  .spec-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .spec-tag { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .spec-note { font-size: 12px; color: var(--fg4); }
  .spec-stage { background: #f6f7f9; border: 1px solid #e7eaee; border-radius: 18px; padding: 20px; }

  .replay { display: inline-flex; align-items: center; gap: 7px; margin-top: 14px; background: #fff; border: 1px solid #d7dbe0; border-radius: 9999px; padding: 7px 15px; font-family: inherit; font-size: 13px; font-weight: 600; color: #0369a1; cursor: pointer; }
  .replay:hover { background: #f6f9fb; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="place-components.jsx"></script>
<script type="text/babel" src="place-verify-done.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [replay, setReplay] = useState(0);
  const [armed, setArmed] = useState(false);
  return (
    <div className="canvas">
      <div className="doc-head">
        <div className="doc-kicker">Pantopus · Place · B3 — Verified</div>
        <h1 className="doc-title">Your address is verified</h1>
        <p className="doc-sub">The payoff, kept quiet. No confetti, no fanfare — a trust product earns its moment by being calm. A green verified seal settles in, one plain line confirms it, and the three rows that just unlocked reveal themselves in a soft stagger. There's exactly one way forward, and it leads home: go to your place.</p>
        <div className="doc-meta">
          <div><span className="sw" style={{ background: '#16A34A' }}></span> Verified / place <b>Home green #16A34A</b></div>
          <div><span className="sw" style={{ background: '#0284C7' }}></span> The one action <b>Sky #0284C7</b></div>
          <div><span className="sw" style={{ background: '#f6f7f9' }}></span> Calm shell — no confetti</div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">01</span>
          <h2 className="zone-title">The screen</h2>
        </div>
        <p className="zone-sub">The seal is the centerpiece — a green disc with a soft double halo, not a burst. <b>Your address is verified.</b> sits under it in one plain sentence, naming the address so the win is concrete. Below, a <b>Now available</b> group reveals the three rows that were locked a moment ago — each a real destination now, with a chevron. The sky <b>Go to your place</b> closes the loop.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <div className={armed ? 'do-reveal' : ''} key={replay} style={{ display: 'inline-block' }}>
              <IOSDevice width={402} height={860}>
                <VerifiedSuccess />
              </IOSDevice>
            </div>
            <button className="replay" onClick={() => { setArmed(true); setReplay((r) => r + 1); }}>
              <Icon name="rotate-ccw" size={14} color="#0369a1" strokeWidth={2.25} />
              Replay the reveal
            </button>
          </div>

          <div className="side-note">
            <h4>No confetti, on purpose</h4>
            <p>This is a trust product, not a game. The moment is marked by a calm seal and a soft halo — the kind of mark you'd find stamped on a document, not a shower of color. Restraint is the reward.</p>

            <h4>One plain sentence</h4>
            <p>"Your address is verified." No exclamation, no hype. The address is named underneath so the confirmation is about this place, this person — concrete proof, not a generic success toast.</p>

            <h4>The reveal, not a list</h4>
            <p>The three rows were locked across the whole flow; here they fade up in sequence. The stagger turns "you unlocked these" into something you watch happen, calmly, rather than a static checklist.</p>

            <h4>Locked rows, now live</h4>
            <p>Message neighbors, your mailbox, a residency letter — the exact promises from the verify sheet, now carrying chevrons because they're real destinations. The loop from B1 closes here.</p>

            <h4>One way forward</h4>
            <p>No secondary buttons, no upsell. "Go to your place" is the only action — the screen exists to confirm and send you home.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">02</span>
          <h2 className="zone-title">The pieces</h2>
        </div>
        <p className="zone-sub">The seal and the now-available rows, on the stage. The seal is a single green disc on two faint green rings — calm enough to live on a confirmation, distinct enough to read as a stamp. The rows are the verify-sheet benefits grown up: same green tiles, now with chevrons, because they finally go somewhere.</p>

        <div className="spec-row">
          <Specimen tag="Verified seal" note="disc + soft double halo">
            <div style={{ display: 'flex', justifyContent: 'center', padding: '12px 0' }}>
              <VerifiedSeal />
            </div>
          </Specimen>

          <Specimen tag="Now-available rows" note="locked promises, now destinations">
            <div className="pl-card" style={{ padding: 0, overflow: 'hidden' }}>
              <AvailableRow icon="message-circle" label="Message neighbors" sub="Start a conversation with people on your block" />
              <AvailableRow icon="mailbox" label="Your mailbox" sub="Track packages, civic notices, and permits" />
              <AvailableRow icon="file-text" label="Generate a residency letter" sub="Proof of address, ready to download" isLast />
            </div>
          </Specimen>

          <Specimen tag="The one action" note="sky, verb-first">
            <GoToPlaceButton />
            <p style={{ margin: '14px 2px 0', fontSize: 12.5, color: 'var(--fg3)', lineHeight: '18px' }}>No secondary path competes with it — the verified resident is sent straight to the place they now fully hold.</p>
          </Specimen>
        </div>
      </div>
    </div>
  );
}

function Specimen({ tag, note, children }) {
  return (
    <div className="specimen">
      <div className="spec-label">
        <span className="spec-tag">{tag}</span>
        {note && <span className="spec-note">{note}</span>}
      </div>
      <div className="spec-stage">{children}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
