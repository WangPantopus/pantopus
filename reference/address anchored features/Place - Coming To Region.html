<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place — Coming to your region (A6)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --canvas-bg: #eceff3; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas-bg); font-family: var(--font-sans); color: var(--app-text); -webkit-font-smoothing: antialiased; }

  .canvas { padding: 56px 40px 96px; max-width: 1360px; margin: 0 auto; }

  .doc-head { margin-bottom: 12px; }
  .doc-kicker { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-identity-home); }
  .doc-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 8px 0 8px; }
  .doc-sub { font-size: 15px; color: var(--fg3); max-width: 800px; line-height: 22px; margin: 0; }
  .doc-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 18px; }
  .doc-meta div { font-size: 12.5px; color: var(--fg3); display: flex; align-items: center; gap: 7px; }
  .doc-meta b { color: var(--fg2); font-weight: 600; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid rgba(0,0,0,.08); }

  .zone { margin-top: 56px; }
  .zone-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .zone-num { font-size: 13px; font-weight: 700; color: var(--color-identity-home); font-variant-numeric: tabular-nums; }
  .zone-title { font-size: 22px; font-weight: 700; letter-spacing: -.015em; margin: 0; }
  .zone-sub { font-size: 14px; color: var(--fg3); margin: 0 0 26px; max-width: 800px; line-height: 21px; }

  /* product cards (inside #f6f7f9 stage and phone) */
  .pl-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .pl-textbtn:hover { color: #0369a1 !important; }

  /* region-state interactions */
  .rg-primary { transition: background .15s ease, box-shadow .15s ease; }
  .rg-primary:hover { background: #0369a1 !important; }
  .lx-back:hover { background: #f3f4f6 !important; }
  .lx-region:hover { background: #f3f4f6 !important; }
  .lx-sugg:hover { background: #f6f9fb; }

  .dash-wrap { display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .phone-cap { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .phone-cap span { font-weight: 500; text-transform: none; letter-spacing: 0; color: var(--fg4); margin-left: 8px; }
  .side-note { max-width: 330px; }
  .side-note h4 { margin: 28px 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .side-note h4:first-child { margin-top: 0; }
  .side-note p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  .note-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(232px, 1fr)); gap: 26px 32px; margin-top: 34px; max-width: 760px; }
  .note-grid h4 { margin: 0 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .note-grid p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }
  .phone-strip { display: flex; flex-wrap: wrap; gap: 30px 36px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="place-components.jsx"></script>
<script type="text/babel" src="place-launch.jsx"></script>
<script type="text/babel" src="place-address.jsx"></script>
<script type="text/babel" src="place-region.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <div className="canvas">
      <div className="doc-head">
        <div className="doc-kicker">Pantopus · Place · A6 — Coming to your region</div>
        <h1 className="doc-title">Coming to your region — non-U.S.</h1>
        <p className="doc-sub">Where a non-U.S. address lands. Home's records and risks lean on U.S. public-data sources that aren't wired up elsewhere yet — so this screen tells the truth plainly, offers a one-tap "notify me", and points to the parts of Pantopus that already work everywhere. Calm and neutral throughout — never a red error, never a hard wall.</p>
        <div className="doc-meta">
          <div><span className="sw" style={{ background: '#16A34A' }}></span> Place / home <b>Home green #16A34A</b></div>
          <div><span className="sw" style={{ background: '#0284C7' }}></span> Notify / Beacon <b>Sky #0284C7</b></div>
          <div><span className="sw" style={{ background: '#f6f7f9' }}></span> Shell <b>flat #f6f7f9</b></div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">01</span>
          <h2 className="zone-title">The region state</h2>
        </div>
        <p className="zone-sub">Not a dead end. The green address mark carries a small clock — the place is recognized, the data just isn't here yet. The headline states it, one plain sentence names <b>exactly what's U.S.-only and why</b> (county records, FEMA, the Census), and a single sky <b>Notify me</b> turns the wait into a choice. Below, an <b>Available everywhere now</b> card routes to Beacon — follow and browse — so there's always somewhere to go.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <ComingToRegion region="United Kingdom" />
            </IOSDevice>
            <div className="phone-cap">Default <span>region detected · United Kingdom</span></div>
          </div>

          <div className="side-note">
            <h4>Honest about the gap</h4>
            <p>One plain sentence names the real reason — Home's records, risks, and details come from U.S. sources like county records, FEMA, and the Census that aren't connected here yet. No hype, no vague "coming soon" with nothing behind it.</p>

            <h4>The wait becomes a choice</h4>
            <p>"Notify me when it's available" is the one primary action — a single tap, one email when Home lands in their region, nothing else. It respects the visitor instead of leaving them stuck.</p>

            <h4>Always a path out</h4>
            <p>The "Available everywhere now" card points to what already ships globally — follow people and places on Beacon, browse the map. The screen never ends in a wall; there's always a next move.</p>

            <h4>Calm, never an error</h4>
            <p>Neutral grays and the home green, sky for the actions — no red, no amber alarm. A region that isn't covered yet is a fact to state plainly, not a failure to flag.</p>

            <h4>Region-aware copy</h4>
            <p>The detected region fills the headline, the body, and the notify promise, so "United Kingdom" or "Australia" reads naturally everywhere. The pill up top stays tappable to change it.</p>

            <h4>Other platforms</h4>
            <p>iOS shown. Android keeps the same stack with a Material filled <b>Notify me</b> and the region pill in the top app bar. On web it's a centered single column in the 1024 frame, the path-out card sitting beside the notify block on wider viewports.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">02</span>
          <h2 className="zone-title">Notified &amp; another region</h2>
        </div>
        <p className="zone-sub">After the tap, the button becomes a quiet green confirmation — "You're on the list" — so the one action has an honest end state, not a silent reset. And because every line is region-aware, the same screen reads just as naturally for any detected region.</p>

        <div className="phone-strip">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <ComingToRegion region="United Kingdom" notified={true} />
            </IOSDevice>
            <div className="phone-cap">Notified <span>"You're on the list"</span></div>
          </div>
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <ComingToRegion region="Australia" />
            </IOSDevice>
            <div className="phone-cap">Another region <span>copy swaps to Australia</span></div>
          </div>
        </div>

        <div className="note-grid">
          <div>
            <h4>A real end state</h4>
            <p>Tapping notify swaps the CTA for a green "You're on the list" card with the promise restated — one email the day Home opens in their region. The action confirms itself instead of vanishing.</p>
          </div>
          <div>
            <h4>One screen, every region</h4>
            <p>The detected region is a token throughout — headline, body, notify promise, and footnote. Australia, Canada, or the UK all read naturally with no bespoke copy per market.</p>
          </div>
          <div>
            <h4>Beacon is the constant</h4>
            <p>Whatever the region, the path out is the same: follow and browse on Beacon. The social layer ships everywhere, so it's always the honest answer to "what can I do here today".</p>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
