<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place — Verification pending (B2)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --canvas-bg: #eceff3; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas-bg); font-family: var(--font-sans); color: var(--app-text); -webkit-font-smoothing: antialiased; }

  .canvas { padding: 56px 40px 96px; max-width: 1360px; margin: 0 auto; }

  .doc-head { margin-bottom: 12px; }
  .doc-kicker { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-identity-home); }
  .doc-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 8px 0 8px; }
  .doc-sub { font-size: 15px; color: var(--fg3); max-width: 820px; line-height: 22px; margin: 0; }
  .doc-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 18px; }
  .doc-meta div { font-size: 12.5px; color: var(--fg3); display: flex; align-items: center; gap: 7px; }
  .doc-meta b { color: var(--fg2); font-weight: 600; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid rgba(0,0,0,.08); }

  .zone { margin-top: 56px; }
  .zone-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .zone-num { font-size: 13px; font-weight: 700; color: var(--color-identity-home); font-variant-numeric: tabular-nums; }
  .zone-title { font-size: 22px; font-weight: 700; letter-spacing: -.015em; margin: 0; }
  .zone-sub { font-size: 14px; color: var(--fg3); margin: 0 0 26px; max-width: 820px; line-height: 21px; }

  /* product cards */
  .pl-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .pl-textbtn:hover { color: #0369a1 !important; }

  /* verify interactions */
  .vf-primary { transition: background .15s ease, box-shadow .15s ease; }
  .vf-primary:hover { background: #0369a1 !important; }
  .lx-back:hover { background: #f1f3f5 !important; }

  /* shimmer skeleton */
  .pl-skel { position: relative; overflow: hidden; background: #eef1f4; }
  .pl-skel::after { content: ''; position: absolute; inset: 0; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255,255,255,.65), transparent); animation: pl-shimmer 1.5s infinite; }
  @keyframes pl-shimmer { 100% { transform: translateX(100%); } }

  /* caret + spinner */
  .lx-caret { animation: lx-blink 1.1s steps(1) infinite; }
  @keyframes lx-blink { 50% { opacity: 0; } }
  .vf-spin { animation: vf-rotate 0.9s linear infinite; }
  @keyframes vf-rotate { 100% { transform: rotate(360deg); } }

  .dash-wrap { display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap; }
  .phone-strip { display: flex; flex-wrap: wrap; gap: 30px 36px; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .phone-cap { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .phone-cap span { font-weight: 500; text-transform: none; letter-spacing: 0; color: var(--fg4); margin-left: 8px; }
  .side-note { max-width: 330px; }
  .side-note h4 { margin: 28px 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .side-note h4:first-child { margin-top: 0; }
  .side-note p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  .note-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(232px, 1fr)); gap: 26px 32px; margin-top: 34px; max-width: 760px; }
  .note-grid h4 { margin: 0 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .note-grid p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  @media (prefers-reduced-motion: reduce) { .pl-skel::after, .lx-caret, .vf-spin { animation: none !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="place-components.jsx"></script>
<script type="text/babel" src="place-verify-pending.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <div className="canvas">
      <div className="doc-head">
        <div className="doc-kicker">Pantopus · Place · B2 — Verification pending</div>
        <h1 className="doc-title">Verification in progress</h1>
        <p className="doc-sub">The wait, made calm and honest. The status screen takes the shape of whichever method was chosen — a postcard on the way with a code field ready for when it lands, or county records being matched behind a shimmer that never once says "Loading…". Both end on the same promise: the dashboard stays fully available the whole time. Home-green anchors the place; sky carries the one way out.</p>
        <div className="doc-meta">
          <div><span className="sw" style={{ background: '#16A34A' }}></span> Place / address <b>Home green #16A34A</b></div>
          <div><span className="sw" style={{ background: '#0284C7' }}></span> Code + CTA <b>Sky #0284C7</b></div>
          <div><span className="sw" style={{ background: '#eef1f4' }}></span> Shimmer skeleton, never "Loading…"</div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">01</span>
          <h2 className="zone-title">Postcard — your code is on the way</h2>
        </div>
        <p className="zone-sub">The slowest, most common path. The screen is honest about the timeline — <b>usually 5–7 days</b> — and puts the six-cell code field on screen now, empty and waiting, so the return trip is obvious. A quiet "Mail a new code" sits under it for the postcard that never arrives. Nothing here is a dead end: the sky <b>Go to your dashboard</b> is the real action today.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <VerifyPending method="mail" />
            </IOSDevice>
            <div className="phone-cap">Postcard pending <span>code field resting</span></div>
          </div>

          <div className="side-note">
            <h4>Honest about the clock</h4>
            <p>"Usually 5–7 days." Postal verification is genuinely slow, so the screen says so up front instead of spinning a promise it can't keep. The clock badge on the address tile carries the same message at a glance.</p>

            <h4>The field waits in the open</h4>
            <p>The six cells sit on screen now, empty, so when the postcard lands the resident knows exactly where the code goes. No hunting, no second screen to find — the destination is already visible.</p>

            <h4>A path for the lost postcard</h4>
            <p>"Didn't arrive in 7 days? Mail a new code." Quiet, sky, never shouting — present for the mail that gets lost without making the happy path feel risky.</p>

            <h4>The way out is the real action</h4>
            <p>There's nothing to do here today, so the primary isn't "submit" — it's "Go to your dashboard." The screen sends you back to the place you already have.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">02</span>
          <h2 className="zone-title">Record match — checking, not "Loading…"</h2>
        </div>
        <p className="zone-sub">The fast path, shown as work in motion. The title carries the ellipsis — <b>Checking property records…</b> — and the body lists the exact sources being matched, each with a shimmer where its result will land. One has already come back <b>Matched</b>; the rest still shimmer. It's a skeleton with meaning, never a bare spinner and never the word "Loading".</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <VerifyPending method="records" />
            </IOSDevice>
            <div className="phone-cap">Record match <span>sources resolving</span></div>
          </div>

          <div className="side-note">
            <h4>A skeleton with meaning</h4>
            <p>Not a centered spinner over nothing. The three rows name the deed, the tax roll, and the USPS match — so the shimmer reads as "these are being checked," concrete progress rather than an empty wait.</p>

            <h4>Results land one by one</h4>
            <p>The county deed has already come back <b>Matched</b> with a green check; the others still shimmer. Progress is visible and partial, the way a real check actually resolves.</p>

            <h4>The spinning badge, not the words</h4>
            <p>The loader on the address tile spins to show motion. The copy never falls back to "Loading…" — the design system replaces that string with shimmer everywhere it would appear.</p>

            <h4>Leave any time</h4>
            <p>"You can leave this screen." A minutes-long match doesn't hold you hostage — the same reassurance card and dashboard button close the screen.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">03</span>
          <h2 className="zone-title">The code field, state by state</h2>
        </div>
        <p className="zone-sub">One field, four moments. Empty and waiting, the focused cell carrying a sky ring and a blinking caret, halfway typed, then full and ready to submit. Same six cells throughout — the active cell is always the one the next digit lands in.</p>

        <div className="phone-strip">
          <div className="phone-col">
            <div className="spec-stage" style={{ background: '#f6f7f9', border: '1px solid #e7eaee', borderRadius: 18, padding: 20, width: 360 }}>
              <CodeBoxes value="" active={false} />
            </div>
            <div className="phone-cap">Resting <span>waiting for the postcard</span></div>
          </div>
          <div className="phone-col">
            <div className="spec-stage" style={{ background: '#f6f7f9', border: '1px solid #e7eaee', borderRadius: 18, padding: 20, width: 360 }}>
              <CodeBoxes value="" active={true} />
            </div>
            <div className="phone-cap">Focused <span>caret in the first cell</span></div>
          </div>
          <div className="phone-col">
            <div className="spec-stage" style={{ background: '#f6f7f9', border: '1px solid #e7eaee', borderRadius: 18, padding: 20, width: 360 }}>
              <CodeBoxes value="042" active={true} />
            </div>
            <div className="phone-cap">Typing <span>three in, caret advances</span></div>
          </div>
          <div className="phone-col">
            <div className="spec-stage" style={{ background: '#f6f7f9', border: '1px solid #e7eaee', borderRadius: 18, padding: 20, width: 360 }}>
              <CodeBoxes value="042817" active={false} />
            </div>
            <div className="phone-cap">Complete <span>six digits, ready</span></div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
