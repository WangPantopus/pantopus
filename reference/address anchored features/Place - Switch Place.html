<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place — Switch place (C2)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --canvas-bg: #eceff3; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas-bg); font-family: var(--font-sans); color: var(--app-text); -webkit-font-smoothing: antialiased; }

  .canvas { padding: 56px 40px 96px; max-width: 1360px; margin: 0 auto; }

  .doc-head { margin-bottom: 12px; }
  .doc-kicker { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-identity-home); }
  .doc-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 8px 0 8px; }
  .doc-sub { font-size: 15px; color: var(--fg3); max-width: 820px; line-height: 22px; margin: 0; }
  .doc-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 18px; }
  .doc-meta div { font-size: 12.5px; color: var(--fg3); display: flex; align-items: center; gap: 7px; }
  .doc-meta b { color: var(--fg2); font-weight: 600; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid rgba(0,0,0,.08); }

  .zone { margin-top: 56px; }
  .zone-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .zone-num { font-size: 13px; font-weight: 700; color: var(--color-identity-home); font-variant-numeric: tabular-nums; }
  .zone-title { font-size: 22px; font-weight: 700; letter-spacing: -.015em; margin: 0; }
  .zone-sub { font-size: 14px; color: var(--fg3); margin: 0 0 26px; max-width: 820px; line-height: 21px; }

  /* product cards */
  .pl-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .pl-hero { box-shadow: 0 3px 12px rgba(17,24,39,.06), 0 1px 2px rgba(0,0,0,.04); }
  .pl-textbtn:hover { color: #0369a1 !important; }
  .pl-nudge { display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 12px; border-radius: 12px; background: #f6f7f9; border: 1px solid #eef0f2; cursor: pointer; font-family: inherit; text-align: left; }
  .pl-nudge.alert { background: #FFFBEB; border-color: #fde68a; }

  /* switcher interactions */
  .sw-row { transition: background .14s ease; }
  .sw-row:hover { background: #f6f7f9 !important; }
  .sw-close:hover { background: #e9ebef !important; }

  /* shimmer */
  .pl-skel { position: relative; overflow: hidden; background: #eef1f4; }
  .pl-skel::after { content: ''; position: absolute; inset: 0; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255,255,255,.65), transparent); animation: pl-shimmer 1.5s infinite; }
  @keyframes pl-shimmer { 100% { transform: translateX(100%); } }

  .dash-wrap { display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .side-note { max-width: 330px; }
  .side-note h4 { margin: 28px 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .side-note h4:first-child { margin-top: 0; }
  .side-note p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  .spec-row { display: flex; flex-wrap: wrap; gap: 30px 40px; align-items: flex-start; }
  .specimen { width: 360px; }
  .spec-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .spec-tag { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .spec-note { font-size: 12px; color: var(--fg4); }
  .spec-stage { background: #f6f7f9; border: 1px solid #e7eaee; border-radius: 18px; padding: 16px; }

  @media (prefers-reduced-motion: reduce) { .pl-skel::after { animation: none; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="place-components.jsx"></script>
<script type="text/babel" src="place-dashboard.jsx"></script>
<script type="text/babel" src="place-dashboard-claimed.jsx"></script>
<script type="text/babel" src="place-switcher.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Specimen({ tag, note, children }) {
  return (
    <div className="specimen">
      <div className="spec-label">
        <span className="spec-tag">{tag}</span>
        {note && <span className="spec-note">{note}</span>}
      </div>
      <div className="spec-stage">{children}</div>
    </div>
  );
}

function App() {
  return (
    <div className="canvas">
      <div className="doc-head">
        <div className="doc-kicker">Pantopus · Place · C2 — Multi-home switcher</div>
        <h1 className="doc-title">Switch place</h1>
        <p className="doc-sub">Some residents hold more than one place — a home, a beach house, a rental they manage. A bottom sheet lists them all: each is a row with the address, a small status (a green <b>Verified</b> badge or an amber <b>Claimed</b>), and a chevron. The current place is marked in sky. Tap any row to switch the whole dashboard to that place; <b>Add a place</b> sits at the bottom to claim or verify another.</p>
        <div className="doc-meta">
          <div><span className="sw" style={{ background: '#16A34A' }}></span> Verified place <b>Home green #16A34A</b></div>
          <div><span className="sw" style={{ background: '#D97706' }}></span> Claimed place <b>Amber #D97706</b></div>
          <div><span className="sw" style={{ background: '#0284C7' }}></span> Current / Add a place <b>Sky #0284C7</b></div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">01</span>
          <h2 className="zone-title">The sheet</h2>
        </div>
        <p className="zone-sub">It rises over a dimmed dashboard so you never lose your place. A grabber, a plain <b>Switch place</b> title, then one row per address. The current place carries a sky tile, a "Current place" line, and a soft sky ring. Tap another row — the dashboard behind switches its address, avatar, and status to match. Try it.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <SwitchPlaceScreen />
            </IOSDevice>
          </div>

          <div className="side-note">
            <h4>Live behind the sheet</h4>
            <p>The switcher is a sheet, not a full takeover. The dashboard stays visible and dimmed underneath, so switching feels like changing a lens — not leaving the screen. Tap a row and the header behind updates immediately.</p>

            <h4>Status travels with the address</h4>
            <p>Each place carries its own trust state. Oak St and Lovejoy St are verified — green shield badges. The Astoria place is only claimed — an amber "Claimed" marker. The badge is the fastest read of what each place can do.</p>

            <h4>The current place is obvious</h4>
            <p>One sky-tiled row with a soft ring and a "Current place" line. No ambiguity about which dashboard you're looking at — and the chevron stays, because tapping it is still a real navigation.</p>

            <h4>Add a place closes the list</h4>
            <p>A sky plus row at the bottom — the one way to grow the list. It leads into the claim/verify flow for a new address, the same path every place on this list once took.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">02</span>
          <h2 className="zone-title">The rows</h2>
        </div>
        <p className="zone-sub">One row shape, three states — current, verified, claimed — plus the add row. House tile, address, the status marker pushed right, chevron. The current place swaps its tile to sky and its sub-line to "Current place"; everything else is identical, so the list reads as one calm column.</p>

        <div className="spec-row">
          <Specimen tag="The rows" note="current · verified · claimed">
            <div className="pl-card" style={{ padding: 6 }}>
              <PlaceRow place={SW_PLACES[0]} active={true} onClick={() => {}} />
              <PlaceRow place={SW_PLACES[2]} active={false} onClick={() => {}} />
              <PlaceRow place={SW_PLACES[1]} active={false} onClick={() => {}} />
            </div>
          </Specimen>

          <Specimen tag="Status markers" note="the fast read">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16, padding: '6px 4px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <PlaceStatus status="verified" />
                <span style={{ fontSize: 13, color: 'var(--fg3)' }}>Address-proven — full access</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <PlaceStatus status="claimed" />
                <span style={{ fontSize: 13, color: 'var(--fg3)' }}>Held, not yet verified</span>
              </div>
            </div>
          </Specimen>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
