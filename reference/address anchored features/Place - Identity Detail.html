<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place — Identity detail (C9)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --canvas-bg: #eceff3; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas-bg); font-family: var(--font-sans); color: var(--app-text); -webkit-font-smoothing: antialiased; }

  .canvas { padding: 56px 40px 96px; max-width: 1360px; margin: 0 auto; }

  .doc-head { margin-bottom: 12px; }
  .doc-kicker { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-identity-home); }
  .doc-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 8px 0 8px; }
  .doc-sub { font-size: 15px; color: var(--fg3); max-width: 820px; line-height: 22px; margin: 0; }
  .doc-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 18px; }
  .doc-meta div { font-size: 12.5px; color: var(--fg3); display: flex; align-items: center; gap: 7px; }
  .doc-meta b { color: var(--fg2); font-weight: 600; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid rgba(0,0,0,.08); }

  .zone { margin-top: 56px; }
  .zone-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .zone-num { font-size: 13px; font-weight: 700; color: var(--color-identity-home); font-variant-numeric: tabular-nums; }
  .zone-title { font-size: 22px; font-weight: 700; letter-spacing: -.015em; margin: 0; }
  .zone-sub { font-size: 14px; color: var(--fg3); margin: 0 0 26px; max-width: 820px; line-height: 21px; }

  /* product cards */
  .pl-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .td-back:hover { background: #f6f7f9 !important; }
  .hm-prompt:hover { background: #f8fafb !important; }
  .id-primary:hover { background: #0369a1 !important; }
  .id-secondary:hover { background: #f8fafb !important; }

  .dash-wrap { display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .stage-cap { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .side-note { max-width: 330px; }
  .side-note h4 { margin: 28px 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .side-note h4:first-child { margin-top: 0; }
  .side-note p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  .spec-row { display: flex; flex-wrap: wrap; gap: 30px 40px; align-items: flex-start; }
  .specimen { width: 360px; }
  .spec-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .spec-tag { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .spec-note { font-size: 12px; color: var(--fg4); }
  .spec-stage { background: #f6f7f9; border: 1px solid #e7eaee; border-radius: 18px; padding: 16px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="place-components.jsx"></script>
<script type="text/babel" src="place-today-detail.jsx"></script>
<script type="text/babel" src="place-identity-detail.jsx"></script>
<script type="text/babel">
function Specimen({ tag, note, children }) {
  return (
    <div className="specimen">
      <div className="spec-label">
        <span className="spec-tag">{tag}</span>
        {note && <span className="spec-note">{note}</span>}
      </div>
      <div className="spec-stage">{children}</div>
    </div>
  );
}

function App() {
  return (
    <div className="canvas">
      <div className="doc-head">
        <div className="doc-kicker">Pantopus · Place · C9 — Identity detail</div>
        <h1 className="doc-title">Your verified status — and proof you can hand someone</h1>
        <p className="doc-sub">Tap-through from Identity. The top of the screen is the thing that makes the rest of Pantopus trustworthy: your address is verified, and the green badge says so plainly — when, and by what method. Below it, that verification does real work. Generate a residency letter, name what it’s for, and watch a clean, branded preview fill in with your name, your verified address, and today’s date. Then deliver it the way you need — download a PDF, or mail a physical copy through your mailbox. The letter is product-UI, not ceremonial stationery: this is a document to use, not a keepsake. Portable ID waits below, marked for what’s next.</p>
        <div className="doc-meta">
          <div><span className="sw" style={{ background: '#16A34A' }}></span> Verified badge <b>#16A34A</b></div>
          <div><span className="sw" style={{ background: '#0284C7' }}></span> Generate / Download <b>Sky #0284C7</b></div>
          <div><span className="sw" style={{ background: '#f3f4f6' }}></span> Coming soon <b>Neutral chip</b></div>
          <div><span className="sw" style={{ background: '#f6f7f9' }}></span> Shell <b>#f6f7f9</b>, white bordered cards</div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">01</span>
          <h2 className="zone-title">The screen</h2>
        </div>
        <p className="zone-sub">Verified status up top with the green badge, the residency-letter generator below it, and Portable ID held for later. Tap "Generate a verified residency letter" in the phone to open the generator.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <IdentityDetail />
            </IOSDevice>
            <div className="stage-cap">Tap "Generate…" to open the letter</div>
          </div>

          <div className="side-note">
            <h4>The badge, stated plainly</h4>
            <p>Verified resident, active, with the when and the how — verified Apr 2, confirmed by mailed postcard. No mystery score; just the fact that anchors everything else.</p>

            <h4>Verification that does work</h4>
            <p>The residency letter turns a status into a usable document. One tap into the generator — proof of address for a landlord, a school, a library card.</p>

            <h4>Honest about scope</h4>
            <p>The letter draws only on what you’ve already verified — it can’t assert more than the app knows. The footnote says so.</p>

            <h4>Portable ID, not yet</h4>
            <p>Carrying verified status to other apps is the obvious next step, marked "Coming soon" rather than hidden or over-promised.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">02</span>
          <h2 className="zone-title">The letter generator</h2>
        </div>
        <p className="zone-sub">Name the purpose, and the preview fills in live — your name, your verified address, today’s date, the stated purpose, and a verification footer. The delivery bar is pinned: mail a copy through the mailbox, or download a PDF.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <ResidencyLetter onBack={() => {}} />
            </IOSDevice>
            <div className="stage-cap">Type a purpose · watch the preview update</div>
          </div>

          <div className="side-note">
            <h4>Product-UI, not stationery</h4>
            <p>Clean sans-serif, the Pantopus mark, a tidy address block — a document built to be used and accepted, deliberately not the serif "letter" surface used for ceremonial mail.</p>

            <h4>Live, honest fields</h4>
            <p>Name and address are pulled from verification and can’t be edited here. Only the purpose is yours to write; leave it blank and it reads "general verification."</p>

            <h4>Two ways out</h4>
            <p>Download a PDF to attach or print, or mail a physical copy through your Pantopus mailbox — the same pipe that handles your packages and civic notices.</p>

            <h4>Tamper-evident footer</h4>
            <p>A verification line with a reference code and a check-back URL, so whoever receives it can confirm it’s real.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">03</span>
          <h2 className="zone-title">The pieces</h2>
        </div>
        <p className="zone-sub">The building blocks on their own — the verified-status badge, the live letter preview, the generator entry, and the Portable ID coming-soon row.</p>

        <div className="spec-row">
          <Specimen tag="Verified status" note="the green badge">
            <VerifiedStatus />
          </Specimen>
          <Specimen tag="Letter preview" note="product-UI · not serif">
            <LetterPreview purpose="New library card application" />
          </Specimen>
          <Specimen tag="Generator entry" note="tap-through">
            <LetterEntry onOpen={() => {}} />
          </Specimen>
          <Specimen tag="Portable ID" note="coming soon row">
            <PortableIdRow />
          </Specimen>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
