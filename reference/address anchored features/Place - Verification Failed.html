<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place — Verification couldn't complete (B4)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --canvas-bg: #eceff3; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas-bg); font-family: var(--font-sans); color: var(--app-text); -webkit-font-smoothing: antialiased; }

  .canvas { padding: 56px 40px 96px; max-width: 1360px; margin: 0 auto; }

  .doc-head { margin-bottom: 12px; }
  .doc-kicker { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-identity-home); }
  .doc-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 8px 0 8px; }
  .doc-sub { font-size: 15px; color: var(--fg3); max-width: 820px; line-height: 22px; margin: 0; }
  .doc-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 18px; }
  .doc-meta div { font-size: 12.5px; color: var(--fg3); display: flex; align-items: center; gap: 7px; }
  .doc-meta b { color: var(--fg2); font-weight: 600; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid rgba(0,0,0,.08); }

  .zone { margin-top: 56px; }
  .zone-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .zone-num { font-size: 13px; font-weight: 700; color: var(--color-identity-home); font-variant-numeric: tabular-nums; }
  .zone-title { font-size: 22px; font-weight: 700; letter-spacing: -.015em; margin: 0; }
  .zone-sub { font-size: 14px; color: var(--fg3); margin: 0 0 26px; max-width: 820px; line-height: 21px; }

  /* product cards */
  .pl-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }

  /* verify interactions */
  .vf-primary { transition: background .15s ease, box-shadow .15s ease; }
  .vf-primary:hover { background: #0369a1 !important; }
  .vf-method:hover { background: #f6f9fb; }
  .lx-back:hover { background: #f1f3f5 !important; }

  .dash-wrap { display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap; }
  .phone-strip { display: flex; flex-wrap: wrap; gap: 30px 36px; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .phone-cap { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .phone-cap span { font-weight: 500; text-transform: none; letter-spacing: 0; color: var(--fg4); margin-left: 8px; }
  .side-note { max-width: 330px; }
  .side-note h4 { margin: 28px 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .side-note h4:first-child { margin-top: 0; }
  .side-note p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  .note-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(232px, 1fr)); gap: 26px 32px; margin-top: 34px; max-width: 760px; }
  .note-grid h4 { margin: 0 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .note-grid p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="place-components.jsx"></script>
<script type="text/babel" src="place-verify.jsx"></script>
<script type="text/babel" src="place-verify-pending.jsx"></script>
<script type="text/babel" src="place-verify-failed.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <div className="canvas">
      <div className="doc-head">
        <div className="doc-kicker">Pantopus · Place · B4 — Couldn't verify</div>
        <h1 className="doc-title">We couldn't verify that yet</h1>
        <p className="doc-sub">The branch where it didn't work — held calm, and never the user's fault. Amber, not red: this is an honest "didn't go through," not an alarm. We name the likely reason in plain words, reassure that nothing they hold changed, and put the other two methods right there as selectable rows. The way forward is simply another door, not a retry of the one that failed.</p>
        <div className="doc-meta">
          <div><span className="sw" style={{ background: '#D97706' }}></span> Didn't complete <b>Amber #D97706</b></div>
          <div><span className="sw" style={{ background: '#0284C7' }}></span> Try another way <b>Sky #0284C7</b></div>
          <div><span className="sw" style={{ background: '#16A34A' }}></span> Nothing lost <b>Home green #16A34A</b></div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">01</span>
          <h2 className="zone-title">The screen</h2>
        </div>
        <p className="zone-sub">Amber tile, soft alert badge — a "didn't work," not a "you broke it." <b>We couldn't verify that yet.</b> The "yet" matters: it's a pause, not a verdict. An amber chip names the reason in two words, a plain sentence explains it without blame, and the two remaining methods sit ready below. The sky <b>Try another way</b> moves to a different door rather than re-knocking on the one that didn't open.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <VerifyFailed method="mail" />
            </IOSDevice>
            <div className="phone-cap">Postcard expired <span>code timed out</span></div>
          </div>

          <div className="side-note">
            <h4>Amber, never red</h4>
            <p>Red is for danger and broken things. A verification that didn't land is neither — so the mark is amber, the calm color of "heads up," and the copy carries no alarm. The dashboard behind it is untouched.</p>

            <h4>"Yet" does the work</h4>
            <p>"We couldn't verify that yet." One word turns a failure into a pause. Nothing is closed off; the path simply continues by another route.</p>

            <h4>Name the reason, skip the blame</h4>
            <p>"The code expired before it was entered — codes stay good for 14 days." Concrete and factual, framed as a thing that happens, not a mistake the person made.</p>

            <h4>The next door is already open</h4>
            <p>The other two methods are right there as selectable rows, one pre-picked. "Try another way" leads to a different method, not a hopeless retry of the expired one.</p>

            <h4>Nothing was lost</h4>
            <p>A quiet green line confirms the dashboard is untouched — the same promise the whole flow has kept, repeated exactly when a person would most fear losing access.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">02</span>
          <h2 className="zone-title">Reason adapts to the method</h2>
        </div>
        <p className="zone-sub">The screen is one template that reshapes to whatever failed. A timed-out postcard offers records and a document; a missed record match offers the postcard and a document. The mark icon, the amber chip, the reason sentence, and the two offered rows all swap together — so the explanation always fits what actually happened.</p>

        <div className="phone-strip">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <VerifyFailed method="mail" />
            </IOSDevice>
            <div className="phone-cap">Code expired <span>offers records · document</span></div>
          </div>
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <VerifyFailed method="records" />
            </IOSDevice>
            <div className="phone-cap">No record match <span>offers mail · document</span></div>
          </div>
        </div>

        <div className="note-grid">
          <div>
            <h4>The reason fits the failure</h4>
            <p>"No record match" gets its own honest sentence — common for renters and recent moves — so a person who isn't on a deed doesn't read it as rejection. Each failure mode owns its explanation.</p>
          </div>
          <div>
            <h4>Only the other methods are offered</h4>
            <p>The method that just failed never reappears in the list. You're handed the two paths that haven't been tried, never asked to repeat the one that didn't work.</p>
          </div>
          <div>
            <h4>One row stays pre-picked</h4>
            <p>The most promising remaining method is selected by default — the document upload after a postcard, an instant match after the postcard — so "Try another way" is actionable the moment the screen lands.</p>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
