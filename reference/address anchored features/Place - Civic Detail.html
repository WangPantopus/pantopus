<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place — Civic detail (C8)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --canvas-bg: #eceff3; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas-bg); font-family: var(--font-sans); color: var(--app-text); -webkit-font-smoothing: antialiased; }

  .canvas { padding: 56px 40px 96px; max-width: 1360px; margin: 0 auto; }

  .doc-head { margin-bottom: 12px; }
  .doc-kicker { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-identity-home); }
  .doc-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 8px 0 8px; }
  .doc-sub { font-size: 15px; color: var(--fg3); max-width: 820px; line-height: 22px; margin: 0; }
  .doc-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 18px; }
  .doc-meta div { font-size: 12.5px; color: var(--fg3); display: flex; align-items: center; gap: 7px; }
  .doc-meta b { color: var(--fg2); font-weight: 600; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid rgba(0,0,0,.08); }

  .zone { margin-top: 56px; }
  .zone-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .zone-num { font-size: 13px; font-weight: 700; color: var(--color-identity-home); font-variant-numeric: tabular-nums; }
  .zone-title { font-size: 22px; font-weight: 700; letter-spacing: -.015em; margin: 0; }
  .zone-sub { font-size: 14px; color: var(--fg3); margin: 0 0 26px; max-width: 820px; line-height: 21px; }

  /* product cards */
  .pl-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .td-back:hover { background: #f6f7f9 !important; }
  .hm-prompt:hover { background: #f8fafb !important; }
  .cv-contact { transition: background .12s ease, border-color .12s ease; }
  .cv-contact:hover { background: #F0F9FF !important; border-color: #bae6fd !important; }

  .dash-wrap { display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .stage-cap { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .side-note { max-width: 330px; }
  .side-note h4 { margin: 28px 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .side-note h4:first-child { margin-top: 0; }
  .side-note p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  .spec-row { display: flex; flex-wrap: wrap; gap: 30px 40px; align-items: flex-start; }
  .specimen { width: 360px; }
  .spec-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .spec-tag { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .spec-note { font-size: 12px; color: var(--fg4); }
  .spec-stage { background: #f6f7f9; border: 1px solid #e7eaee; border-radius: 18px; padding: 16px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="place-components.jsx"></script>
<script type="text/babel" src="place-today-detail.jsx"></script>
<script type="text/babel" src="place-civic-detail.jsx"></script>
<script type="text/babel">
function Specimen({ tag, note, children }) {
  return (
    <div className="specimen">
      <div className="spec-label">
        <span className="spec-tag">{tag}</span>
        {note && <span className="spec-note">{note}</span>}
      </div>
      <div className="spec-stage">{children}</div>
    </div>
  );
}

function App() {
  return (
    <div className="canvas">
      <div className="doc-head">
        <div className="doc-kicker">Pantopus · Place · C8 — Civic detail</div>
        <h1 className="doc-title">Who represents this address — and what’s on the ballot</h1>
        <p className="doc-sub">Tap-through from Civic. Two things are always here: the districts that cover your address — federal, state, local — given a deep-evergreen "seal" treatment because they don’t change with the season; and the people who hold those offices, each a row you can call, email, or look up. The third thing comes and goes. When a supported election is near, the screen surfaces the date, how you vote, and a plain-language ballot preview. When there’s nothing scheduled, it says so calmly — and your districts and representatives stay right where they are. Everything is informational and nonpartisan; no endorsements, every card sourced.</p>
        <div className="doc-meta">
          <div><span className="sw" style={{ background: '#15803d' }}></span> Civic evergreen <b>#15803d</b></div>
          <div><span className="sw" style={{ background: '#16A34A' }}></span> Place green <b>#16A34A</b></div>
          <div><span className="sw" style={{ background: '#0284C7' }}></span> Contact / tap-through <b>Sky #0284C7</b></div>
          <div><span className="sw" style={{ background: '#f6f7f9' }}></span> Shell <b>#f6f7f9</b>, white bordered cards</div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">01</span>
          <h2 className="zone-title">In season</h2>
        </div>
        <p className="zone-sub">A supported election is near. Districts and representatives on top as always; below them the election block — date, how you vote, and a tappable ballot preview. Tap "Your ballot" in the phone to open the full ballot leaf.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <CivicDetail season="in" />
            </IOSDevice>
            <div className="stage-cap">Tap "Your ballot" to preview races</div>
          </div>

          <div className="side-note">
            <h4>Districts as a seal</h4>
            <p>The evergreen header and bullet rail set the districts apart — this is the civic baseline, grouped Federal / State / Local, marked "Current." It’s the one block that’s always true for your address.</p>

            <h4>Representatives you can reach</h4>
            <p>Name, office, party, and a small set of contact actions — call, email, website — for every level. Lifted from open civic data, not a directory you maintain.</p>

            <h4>Election, when it’s real</h4>
            <p>A dated banner with a days-away chip, your vote method (vote-by-mail here), and a ballot preview. Concrete and time-bound, never a permanent fixture.</p>

            <h4>Nonpartisan by construction</h4>
            <p>Candidates are listed, never ranked or recommended. Every section carries a source and as-of, and the footer states the app endorses no one.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">02</span>
          <h2 className="zone-title">The ballot leaf</h2>
        </div>
        <p className="zone-sub">"Your ballot" opens a neutral preview of every race and measure — candidates in randomized order, measures in plain language with a one-line summary. A reference, explicitly not the official record.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <BallotDetail onBack={() => {}} />
            </IOSDevice>
            <div className="stage-cap">Offices · measures · plain language</div>
          </div>

          <div className="side-note">
            <h4>Offices and candidates</h4>
            <p>Each race is a card; candidates sit under it as a checklist that mirrors the paper ballot, order randomized the same way yours will be.</p>

            <h4>Measures in plain English</h4>
            <p>A measure number, a one-sentence summary of what it actually does, and the Yes / No it asks — no legalese, no lean.</p>

            <h4>A preview, not the record</h4>
            <p>The footer is explicit: this is for reference, the app endorses nothing, and your official ballot is the thing that counts.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">03</span>
          <h2 className="zone-title">Off season</h2>
        </div>
        <p className="zone-sub">No election scheduled. The election block collapses to a calm, honest empty state — and the districts and representatives stay exactly where they were. The page never feels broken just because it isn’t election time.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <CivicDetail season="off" />
            </IOSDevice>
            <div className="stage-cap">"No upcoming election" · districts still shown</div>
          </div>

          <div className="side-note">
            <h4>Calm, not empty</h4>
            <p>A single centered card — "No upcoming election" — with one line on what will appear here when a date is set. No dead space, no error tone.</p>

            <h4>The baseline holds</h4>
            <p>Districts and representatives are evergreen by design: they’re just as present off-season as on. The civic value of the screen doesn’t depend on the calendar.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">04</span>
          <h2 className="zone-title">The pieces</h2>
        </div>
        <p className="zone-sub">The building blocks on their own — the evergreen districts seal, the grouped representatives list, the election banner, and the off-season state.</p>

        <div className="spec-row">
          <Specimen tag="Your districts" note="evergreen seal · always current">
            <DistrictsCard />
          </Specimen>
          <Specimen tag="Representatives" note="name · office · contact">
            <RepsList />
          </Specimen>
          <Specimen tag="Election banner" note="dated · days-away chip">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <ElectionBanner />
              <PollingCard />
            </div>
          </Specimen>
          <Specimen tag="Off-season state" note="calm empty">
            <NoElection />
          </Specimen>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
