<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Place — Money Signals detail (C7)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { --canvas-bg: #eceff3; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas-bg); font-family: var(--font-sans); color: var(--app-text); -webkit-font-smoothing: antialiased; }

  .canvas { padding: 56px 40px 96px; max-width: 1360px; margin: 0 auto; }

  .doc-head { margin-bottom: 12px; }
  .doc-kicker { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--color-identity-home); }
  .doc-title { font-size: 34px; font-weight: 700; letter-spacing: -.02em; margin: 8px 0 8px; }
  .doc-sub { font-size: 15px; color: var(--fg3); max-width: 820px; line-height: 22px; margin: 0; }
  .doc-meta { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 18px; }
  .doc-meta div { font-size: 12.5px; color: var(--fg3); display: flex; align-items: center; gap: 7px; }
  .doc-meta b { color: var(--fg2); font-weight: 600; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1px solid rgba(0,0,0,.08); }

  .zone { margin-top: 56px; }
  .zone-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .zone-num { font-size: 13px; font-weight: 700; color: var(--color-identity-home); font-variant-numeric: tabular-nums; }
  .zone-title { font-size: 22px; font-weight: 700; letter-spacing: -.015em; margin: 0; }
  .zone-sub { font-size: 14px; color: var(--fg3); margin: 0 0 26px; max-width: 820px; line-height: 21px; }

  /* product cards */
  .pl-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .td-back:hover { background: #f6f7f9 !important; }
  .rk-row { transition: background .12s ease; }
  .hm-prompt:hover { background: #f8fafb !important; }
  .pl-textbtn:hover { color: #0369a1 !important; }

  .dash-wrap { display: flex; gap: 64px; align-items: flex-start; flex-wrap: wrap; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .stage-cap { font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .side-note { max-width: 330px; }
  .side-note h4 { margin: 28px 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .side-note h4:first-child { margin-top: 0; }
  .side-note p { margin: 0; font-size: 13px; color: var(--fg3); line-height: 19px; }

  .spec-row { display: flex; flex-wrap: wrap; gap: 30px 40px; align-items: flex-start; }
  .specimen { width: 360px; }
  .spec-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .spec-tag { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--fg2); }
  .spec-note { font-size: 12px; color: var(--fg4); }
  .spec-stage { background: #f6f7f9; border: 1px solid #e7eaee; border-radius: 18px; padding: 16px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="place-components.jsx"></script>
<script type="text/babel" src="place-today-detail.jsx"></script>
<script type="text/babel" src="place-home-detail.jsx"></script>
<script type="text/babel" src="place-money-detail.jsx"></script>
<script type="text/babel">
function Specimen({ tag, note, children }) {
  return (
    <div className="specimen">
      <div className="spec-label">
        <span className="spec-tag">{tag}</span>
        {note && <span className="spec-note">{note}</span>}
      </div>
      <div className="spec-stage">{children}</div>
    </div>
  );
}

function App() {
  return (
    <div className="canvas">
      <div className="doc-head">
        <div className="doc-kicker">Pantopus · Place · C7 — Money Signals detail</div>
        <h1 className="doc-title">Money signals, never money advice</h1>
        <p className="doc-sub">Tap-through from Money Signals. Four readings about the cost of living at this address — what your electric bill looks like against similar homes, which incentive programs you might qualify for, where local rents sit, and how your tax assessment compares to the block. Each is framed as information, not instruction: bills are peer-relative, incentives say "verify with the provider," rent is a band you can locate yourself within privately, and the tax row opens a plain explanation of how appeals work — with no savings promised and no advice given.</p>
        <div className="doc-meta">
          <div><span className="sw" style={{ background: '#16A34A' }}></span> Home green <b>#16A34A</b></div>
          <div><span className="sw" style={{ background: '#0284C7' }}></span> Your-input / tap-through <b>Sky #0284C7</b></div>
          <div><span className="sw" style={{ background: '#FFFBEB', borderColor: '#fde68a' }}></span> Disclaimer <b>Amber wash</b></div>
          <div><span className="sw" style={{ background: '#f6f7f9' }}></span> Shell <b>#f6f7f9</b>, white bordered cards</div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">01</span>
          <h2 className="zone-title">The screen</h2>
        </div>
        <p className="zone-sub">Four money readings, top to bottom. The rent band takes a private input — tap "Add your rent" and plot yourself on the HUD band. The tax row at the bottom opens the appeals leaf; the back chevron returns you. Everything carries a source and a clear "this is information, not advice" line.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <MoneyDetail />
            </IOSDevice>
            <div className="stage-cap">Add your rent · tap the tax row to open appeals</div>
          </div>

          <div className="side-note">
            <h4>Bills, peer-relative</h4>
            <p>No raw ranking — your bill sits against a shaded band of what comparable 3-bed homes pay. The takeaway is a feel ("lower than typical"), backed by your real number.</p>

            <h4>Incentives, honestly hedged</h4>
            <p>DSIRE programs you might qualify for, each carrying "You may be eligible" and a standing reminder to verify amounts with the provider. The app never tells you you've got the money.</p>

            <h4>Rent you locate yourself</h4>
            <p>The HUD 2BR band is public; your rent is private. Add it and a sky marker shows where you fall — within, above, or below — stored only on your account.</p>

            <h4>Tax, compared not coached</h4>
            <p>Your assessment next to nearby comps, with a neutral read. The appeals row explains the process plainly and stops there — no savings math, no "you should."</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">02</span>
          <h2 className="zone-title">The appeals leaf</h2>
        </div>
        <p className="zone-sub">"How appeals work in your county" opens a calm, numbered walk-through — deadline, petition, evidence, hearing, decision — sourced to the county assessor and capped with an amber disclaimer that draws the bright line: process, not advice.</p>

        <div className="dash-wrap">
          <div className="phone-col">
            <IOSDevice width={402} height={860}>
              <AppealInfo onBack={() => {}} />
            </IOSDevice>
            <div className="stage-cap">Plain process · no savings promise</div>
          </div>

          <div className="side-note">
            <h4>Five plain steps</h4>
            <p>Check the deadline, file the petition, gather evidence, attend the hearing, get a decision. Numbered and connected, so the whole path reads at a glance.</p>

            <h4>Local by county</h4>
            <p>Named bodies and dates — Board of Property Tax Appeals, the December 31 window — keep it concrete to where the resident actually lives.</p>

            <h4>The bright line</h4>
            <p>The amber footer is deliberate: this is the general process, not legal or tax advice, and it predicts nothing about your bill. Official site for the exact forms.</p>
          </div>
        </div>
      </div>

      <div className="zone">
        <div className="zone-head">
          <span className="zone-num">03</span>
          <h2 className="zone-title">The pieces</h2>
        </div>
        <p className="zone-sub">Each reading on its own. The rent band is shown with a rent already plotted; tap "Edit" in the live phone above to see the input flow.</p>

        <div className="spec-row">
          <Specimen tag="Bill benchmark" note="peer-relative band">
            <BillBenchmark />
          </Specimen>
          <Specimen tag="Incentives" note="DSIRE · verify with provider">
            <IncentivesList />
          </Specimen>
          <Specimen tag="Rent band" note="HUD + private input">
            <RentBand />
          </Specimen>
          <Specimen tag="Tax check" note="assessment vs comps + appeals">
            <TaxCheck onAppeal={() => {}} />
          </Specimen>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
