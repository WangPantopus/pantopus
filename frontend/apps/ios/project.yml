# XcodeGen project definition — https://github.com/yonaskolb/XcodeGen
#
# This file is the single source of truth for the Xcode project.
# Run `xcodegen generate` (or `make bootstrap`) to produce Pantopus.xcodeproj.
# Pantopus.xcodeproj is NOT committed — it is regenerated from this file.

name: Pantopus

options:
  bundleIdPrefix: app.pantopus
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  transitivelyLinkDependencies: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    CLANG_ENABLE_MODULES: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "" # Set in Xcode or via xcconfig; do not commit a team ID
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
    ENABLE_BITCODE: NO
    OTHER_SWIFT_FLAGS:
      - "-enable-upcoming-feature"
      - "ExistentialAny"

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Pantopus.xcconfig
  Release: Config/Pantopus.xcconfig

packages:
  # Stripe iOS SDK — payments (card, Apple Pay, PaymentSheet)
  Stripe:
    url: https://github.com/stripe/stripe-ios
    from: "23.32.0"
  # Socket.IO client for realtime chat
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: "16.1.1"
  # Keychain wrapper — cleaner than raw Security framework
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
  # Structured logging
  SwiftLog:
    url: https://github.com/apple/swift-log
    from: "1.6.0"
  # Crash + performance reporting
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.36.0"

targets:
  Pantopus:
    type: application
    platform: iOS
    sources:
      - path: Pantopus
        excludes:
          - "**/*.md"
    resources:
      - path: Pantopus/Resources/Assets.xcassets
      - path: "Pantopus/Preview Content"
        buildPhase: resources
    info:
      path: Pantopus/Resources/Info.plist
      properties:
        CFBundleDisplayName: Pantopus
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        StripePublishableKey: $(STRIPE_PUBLISHABLE_KEY)
        SentryDSN: $(SENTRY_DSN)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: "Pantopus uses your location to show gigs and neighbors near you."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Pantopus uses your location to show gigs and neighbors near you, and for location-based notifications."
        NSCameraUsageDescription: "Pantopus uses the camera for profile photos, listing images, and mail capture."
        NSPhotoLibraryUsageDescription: "Pantopus uses your photo library to upload profile photos, listing images, and mail."
        NSMicrophoneUsageDescription: "Pantopus uses the microphone for voice messages in chat."
        NSFaceIDUsageDescription: "Pantopus uses Face ID to lock sensitive actions like payments."
        UIBackgroundModes:
          - remote-notification
        LSApplicationQueriesSchemes:
          - tel
          - mailto
          - sms
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - pantopus
    entitlements:
      path: Pantopus/Resources/Pantopus.entitlements
      properties:
        aps-environment: development
        com.apple.developer.associated-domains:
          - applinks:pantopus.app
          - applinks:www.pantopus.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pantopus.ios
        PRODUCT_NAME: Pantopus
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        DEVELOPMENT_ASSET_PATHS: '"Pantopus/Preview Content"'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          GCC_PREPROCESSOR_DEFINITIONS: "DEBUG=1"
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
    dependencies:
      - package: Stripe
        product: StripePaymentSheet
      - package: Stripe
        product: StripeApplePay
      - package: SocketIO
        product: SocketIO
      - package: KeychainAccess
      - package: SwiftLog
        product: Logging
      - package: Sentry
        product: Sentry
    scheme:
      testTargets:
        - PantopusTests
        - PantopusUITests
      gatherCoverageData: true
      environmentVariables:
        - variable: PANTOPUS_API_ENV
          value: local
          isEnabled: true

  PantopusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PantopusTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pantopus.ios.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Pantopus

  PantopusUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PantopusUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pantopus.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Pantopus
    dependencies:
      - target: Pantopus
