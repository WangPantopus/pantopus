version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pantopus-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - PGBOSS_ENABLED=false
      - CRON_ENABLED=false
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Exclude node_modules from host
      - /app/node_modules
      # Persist logs
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - pantopus-network
    command: npm run dev

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pantopus-worker
    env_file:
      - .env.dev
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - PGBOSS_ENABLED=true
      - CRON_ENABLED=true
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - pantopus-network
    command: npx nodemon worker.js

networks:
  pantopus-network:
    driver: bridge
